version: "0.5"

log_location: "${REPORTS_DIR:-reports}/devbox-unit-tests-logs"
log_level: info
is_strict: true

processes:
  # Android plugin unit tests
  test-android-lib:
    command: "bash plugins/tests/android/test-lib.sh"
    availability:
      restart: "no"

  test-android-devices:
    command: "bash plugins/tests/android/test-devices.sh"
    availability:
      restart: "no"

  # Android integration tests
  test-android-device-mgmt:
    command: "bash tests/integration/android/test-device-mgmt.sh"
    availability:
      restart: "no"

  test-android-validation:
    command: "bash tests/integration/android/test-validation.sh"
    availability:
      restart: "no"

  # iOS plugin unit tests
  test-ios-lib:
    command: "sh plugins/tests/ios/test-lib.sh"
    availability:
      restart: "no"

  test-ios-devices:
    command: "sh plugins/tests/ios/test-devices.sh"
    availability:
      restart: "no"

  # iOS integration tests
  test-ios-device-mgmt:
    command: "bash tests/integration/ios/test-device-mgmt.sh"
    availability:
      restart: "no"

  test-ios-cache:
    command: "bash tests/integration/ios/test-cache.sh"
    availability:
      restart: "no"

  # React Native plugin unit tests
  test-rn-lib:
    command: "bash plugins/tests/react-native/test-lib.sh"
    availability:
      restart: "no"

  # Summary - only runs when all tests pass
  summary:
    command: |
      echo ""
      echo "========================================"
      echo "     UNIT TESTS SUITE SUMMARY"
      echo "========================================"
      echo ""
      echo "Android Tests:"
      echo "  - lib.sh"
      echo "  - devices.sh"
      echo "  - device-mgmt (integration)"
      echo "  - validation (integration)"
      echo ""
      echo "iOS Tests:"
      echo "  - lib.sh"
      echo "  - devices.sh"
      echo "  - device-mgmt (integration)"
      echo "  - cache (integration)"
      echo ""
      echo "React Native Tests:"
      echo "  - lib.sh"
      echo ""
      echo "========================================"
      echo "     ALL UNIT TESTS PASSED"
      echo "========================================"
      echo ""

      # In TUI mode, delay 30 seconds so user can view summary before exit
      if [ "${TEST_TUI:-false}" = "true" ] || [ "${TEST_TUI:-false}" = "1" ]; then
        echo ""
        echo "TUI mode: Waiting 30 seconds before exit (Ctrl+C to exit now)..."
        sleep 30
        echo "Exiting..."
      fi
    depends_on:
      test-android-lib:
        condition: process_completed_successfully
      test-android-devices:
        condition: process_completed_successfully
      test-android-device-mgmt:
        condition: process_completed_successfully
      test-android-validation:
        condition: process_completed_successfully
      test-ios-lib:
        condition: process_completed_successfully
      test-ios-devices:
        condition: process_completed_successfully
      test-ios-device-mgmt:
        condition: process_completed_successfully
      test-ios-cache:
        condition: process_completed_successfully
      test-rn-lib:
        condition: process_completed_successfully
    availability:
      restart: "no"
      exit_on_end: true
