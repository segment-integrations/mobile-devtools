version: "0.5"

environment:
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "SUITE_NAME=ios-e2e"

log_location: "reports/ios-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 1: Build app - runs first
  build-app:
    command: "ios.sh build"
    availability:
      restart: "no"

  # Phase 2: Sync simulators - ensure all simulators match device definitions
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 3: Start simulator - depends on sync completing
  ios-simulator:
    command: |
      set -e
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        ios.sh simulator start --pure ${IOS_DEVICE}
      else
        ios.sh simulator start ${IOS_DEVICE}
      fi
      # Keep process alive for readiness probe (process-compose services pattern)
      tail -f /dev/null
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 12

  # Phase 4: Deploy app - depends on both build and simulator
  deploy-app:
    command: |
      set -e
      ios.sh deploy

      echo ""
      echo "Waiting for app to start..."
      max_attempts=10
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if ios.sh app status; then
          echo "App is running"
          exit 0
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts..."
        sleep 2
      done

      echo "ERROR: App did not start within timeout" >&2
      exit 1
    depends_on:
      build-app:
        condition: process_completed_successfully
      ios-simulator:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 5: Verify app is running (liveness check)
  verify-app-running:
    command: |
      if ios.sh app status; then
        echo "App is running"
        mkdir -p reports
        touch reports/.e2e-passed
        exit 0
      else
        echo "ERROR: App not found in running processes"
        exit 1
      fi
    depends_on:
      deploy-app:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - stop everything in pure mode, keep running in dev mode
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        ios.sh app stop || true
        ios.sh simulator stop
        echo "App stopped, test simulator deleted"
      else
        echo "Test complete - app and simulator still running"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - always runs, checks marker file for pass/fail
  summary:
    command: "bash tests/test-summary.sh 'iOS E2E Test Suite' 'reports/ios-e2e-logs' 'reports/.e2e-passed'"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
