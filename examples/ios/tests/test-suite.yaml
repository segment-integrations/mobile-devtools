version: "0.5"

environment:
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "SUITE_NAME=ios-e2e"

log_location: "reports/ios-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 0: Setup - ensure iOS environment is ready
  setup-sdk:
    command: "bash ${IOS_SCRIPTS_DIR}/user/setup.sh"
    availability:
      restart: "no"

  # Phase 1: Build app (depends on SDK setup)
  build-app:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: |
      set -e
      _step="build-app"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      DERIVED_DATA="${DEVBOX_PROJECT_ROOT:-.}/.devbox/virtenv/ios/DerivedData"
      mkdir -p "$DERIVED_DATA"
      xcodebuild -project ios.xcodeproj -scheme ios \
        -configuration Debug \
        -destination "generic/platform=iOS Simulator" \
        -derivedDataPath "$DERIVED_DATA" \
        build

      echo "pass" > "$_step_dir/$_step.status"
    availability:
      restart: "no"

  # Phase 2: Sync simulators - ensure all simulators match device definitions
  sync-simulators:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 3: Start simulator (runs concurrently with build)
  ios-simulator:
    command: |
      set -e
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        ios.sh simulator start --pure ${IOS_DEVICE}
      else
        ios.sh simulator start ${IOS_DEVICE}
      fi
      # Keep process alive for readiness probe (process-compose services pattern)
      tail -f /dev/null
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 36

  # Phase 4: Deploy app - depends on both build and simulator
  deploy-app:
    command: |
      set -e
      _step="deploy-app"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      ios.sh deploy

      echo ""
      echo "Waiting for app to start..."
      max_attempts=10
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if ios.sh app status; then
          echo "App is running"
          echo "pass" > "$_step_dir/$_step.status"
          exit 0
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts..."
        sleep 2
      done

      printf 'fail\nApp did not start within timeout\n' > "$_step_dir/$_step.status"
      exit 1
    depends_on:
      build-app:
        condition: process_completed_successfully
      ios-simulator:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 5: Verify app is running (liveness check)
  verify-app-running:
    command: |
      _step="verify-app"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      if ios.sh app status; then
        echo "App is running"
        echo "pass" > "$_step_dir/$_step.status"
        exit 0
      else
        printf 'fail\nApp not found in running processes\n' > "$_step_dir/$_step.status"
        exit 1
      fi
    depends_on:
      deploy-app:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - stop everything in pure mode, keep running in dev mode
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        ios.sh app stop || true
        ios.sh simulator stop
        echo "App stopped, test simulator deleted"
      else
        echo "Test complete - app and simulator still running"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - reports per-step pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "iOS E2E Test Suite"
      e2e_report_steps || true
      test_summary "ios-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
