version: "0.5"

environment:
  - "SUITE_NAME=android-e2e"
  - "TEST_TUI=${TEST_TUI:-false}"
  - "ANDROID_DEBUG_SETUP=${ANDROID_DEBUG_SETUP:-}"

log_location: "reports/android-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 0: Setup - evaluate Android SDK and write path for sibling processes
  setup-sdk:
    command: |
      set -e
      _step="setup-sdk"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nAndroid SDK setup failed\n" > "$_step_dir/$_step.status"' ERR

      . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh

      # If init/setup.sh didn't set ANDROID_SDK_ROOT (Nix eval failed),
      # try direct Nix build with visible errors for CI debugging
      if [ -z "${ANDROID_SDK_ROOT:-}" ]; then
        echo "SDK not resolved by init/setup.sh, trying direct Nix build with visible errors..."
        flake_root="${ANDROID_SDK_FLAKE_PATH:-${ANDROID_RUNTIME_DIR}}"
        flake_output="${ANDROID_SDK_FLAKE_OUTPUT:-android-sdk}"
        if command -v nix >/dev/null 2>&1; then
          sdk_out=$(
            nix --extra-experimental-features 'nix-command flakes' \
              build "path:${flake_root}#${flake_output}" --no-link --print-out-paths 2>&1
          ) || true
          if [ -n "${sdk_out:-}" ] && echo "$sdk_out" | grep -q "^/nix/store/"; then
            sdk_path=$(echo "$sdk_out" | grep "^/nix/store/" | head -1)
            if [ -d "$sdk_path/libexec/android-sdk" ]; then
              ANDROID_SDK_ROOT="$sdk_path/libexec/android-sdk"
              export ANDROID_SDK_ROOT ANDROID_HOME="$ANDROID_SDK_ROOT"
            fi
          fi
          if [ -z "${ANDROID_SDK_ROOT:-}" ] && [ -n "${sdk_out:-}" ]; then
            echo "⚠️  Nix build output (last 30 lines):" >&2
            echo "$sdk_out" | tail -30 >&2
          fi
        fi
      fi

      # Fallback: detect from adb in PATH
      if [ -z "${ANDROID_SDK_ROOT:-}" ]; then
        adb_path="$(command -v adb 2>/dev/null || true)"
        if [ -n "$adb_path" ]; then
          sdk_candidate="$(cd "$(dirname "$adb_path")/.." && pwd)"
          if [ -d "$sdk_candidate/platform-tools" ]; then
            ANDROID_SDK_ROOT="$sdk_candidate"
            export ANDROID_SDK_ROOT ANDROID_HOME="$ANDROID_SDK_ROOT"
          fi
        fi
      fi

      # Write SDK root to shared file for sibling processes
      mkdir -p "${ANDROID_RUNTIME_DIR}/.state"
      echo "${ANDROID_SDK_ROOT:-}" > "${ANDROID_RUNTIME_DIR}/.state/sdk_root"
      echo "✅ Android SDK ready: ${ANDROID_SDK_ROOT:-NOT SET}"
      [ -n "${ANDROID_SDK_ROOT:-}" ] || exit 1

      echo "pass" > "$_step_dir/$_step.status"
    availability:
      restart: "no"

  # Phase 1: Build app (depends on SDK setup)
  build-app:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: |
      set -e
      _step="build-app"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      # Read SDK root from setup-sdk (process-compose processes have isolated envs)
      if [ -z "${ANDROID_SDK_ROOT:-}" ] && [ -f "${ANDROID_RUNTIME_DIR}/.state/sdk_root" ]; then
        ANDROID_SDK_ROOT="$(cat "${ANDROID_RUNTIME_DIR}/.state/sdk_root")"
        ANDROID_HOME="$ANDROID_SDK_ROOT"
        export ANDROID_SDK_ROOT ANDROID_HOME
      fi

      gradle assembleDebug

      echo "pass" > "$_step_dir/$_step.status"
    availability:
      restart: "no"

  # Phase 2a: Sync AVDs - ensure all AVDs match device definitions
  sync-avds:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 2b: Start emulator (runs concurrently with build)
  android-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      set -e
      echo "[ANDROID-EMULATOR] Starting emulator..."
      device="${ANDROID_DEFAULT_DEVICE:-max}"

      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Starting fresh Android emulator (pure mode): $device"
        android.sh emulator start --pure "$device"
      else
        echo "Starting Android emulator: $device"
        unset ANDROID_EMULATOR_FOREGROUND
        android.sh emulator start "$device"
      fi
      # Keep process alive for readiness probe (process-compose services pattern)
      tail -f /dev/null
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 60

  # Phase 3: Deploy app - depends on both build and emulator being ready
  deploy-app:
    command: |
      set -e
      _step="deploy-app"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      android.sh deploy

      echo ""
      echo "Waiting for app to start..."
      max_attempts=10
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if android.sh app status; then
          echo "App is running"
          echo "pass" > "$_step_dir/$_step.status"
          exit 0
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts..."
        sleep 2
      done

      printf 'fail\nApp did not start within timeout\n' > "$_step_dir/$_step.status"
      exit 1
    depends_on:
      build-app:
        condition: process_completed_successfully
      android-emulator:
        condition: process_healthy
    availability:
      restart: "no"

  # Cleanup - stop everything in pure mode, keep running in dev mode
  cleanup-app:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        android.sh app stop || true
        android.sh emulator stop || true
        echo "App stopped, emulator stopped"
      else
        echo "Test complete - app and emulator still running"
      fi
    depends_on:
      deploy-app:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - reports per-step pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "Android E2E Test Suite"
      e2e_report_steps || true
      test_summary "android-e2e"
    depends_on:
      cleanup-app:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
