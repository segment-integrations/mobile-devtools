version: "0.5"

environment:
  - "SUITE_NAME=android-e2e"
  - "TEST_TUI=${TEST_TUI:-false}"

log_location: "reports/android-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 0: Setup - evaluate Android SDK and write path for sibling processes
  setup-sdk:
    command: |
      set -e
      _step="setup-sdk"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      bash ${ANDROID_RUNTIME_DIR}/scripts/user/setup.sh

      # Verify state file was written
      if [ -f "${ANDROID_RUNTIME_DIR}/.state/sdk_root" ]; then
        sdk_root="$(cat "${ANDROID_RUNTIME_DIR}/.state/sdk_root")"
        if [ -n "$sdk_root" ]; then
          echo "pass" > "$_step_dir/$_step.status"
        else
          printf 'fail\nANDROID_SDK_ROOT not set after setup\n' > "$_step_dir/$_step.status"
          exit 1
        fi
      else
        printf 'fail\nSetup did not write state file\n' > "$_step_dir/$_step.status"
        exit 1
      fi
    availability:
      restart: "no"

  # Phase 1: Build app (depends on SDK setup)
  build-app:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: |
      set -e
      _step="build-app"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      # Read SDK root from setup-sdk (process-compose processes have isolated envs)
      if [ -z "${ANDROID_SDK_ROOT:-}" ] && [ -f "${ANDROID_RUNTIME_DIR}/.state/sdk_root" ]; then
        ANDROID_SDK_ROOT="$(cat "${ANDROID_RUNTIME_DIR}/.state/sdk_root")"
        ANDROID_HOME="$ANDROID_SDK_ROOT"
        export ANDROID_SDK_ROOT ANDROID_HOME
      fi

      if [ -z "${ANDROID_SDK_ROOT:-}" ]; then
        echo "ERROR: ANDROID_SDK_ROOT empty after reading state file" >&2
        printf 'fail\nANDROID_SDK_ROOT empty - setup may have failed\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      gradle assembleDebug

      echo "pass" > "$_step_dir/$_step.status"
    availability:
      restart: "no"

  # Phase 2a: Sync AVDs - ensure all AVDs match device definitions
  sync-avds:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 2b: Start emulator (runs concurrently with build)
  android-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      set -e
      echo "[ANDROID-EMULATOR] Starting emulator..."
      device="${ANDROID_DEFAULT_DEVICE:-max}"

      # Capture emulator start result for better error reporting
      start_exit=0
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Starting fresh Android emulator (pure mode): $device"
        android.sh emulator start --pure "$device" || start_exit=$?
      else
        echo "Starting Android emulator: $device"
        unset ANDROID_EMULATOR_FOREGROUND
        android.sh emulator start "$device" || start_exit=$?
      fi

      if [ "$start_exit" -ne 0 ]; then
        echo ""
        echo "ERROR: Emulator start command failed with exit code $start_exit" >&2
        echo ""
        echo "Common causes:" >&2
        echo "  - Device '$device' not found (check ANDROID_DEVICES filter)" >&2
        echo "  - AVD creation failed (check sync-avds logs)" >&2
        echo "  - System image not available for device" >&2
        echo ""
        echo "Available AVDs:" >&2
        avdmanager list avd 2>/dev/null || echo "(avdmanager not available)"
        exit "$start_exit"
      fi

      # Keep process alive for readiness probe (process-compose services pattern)
      tail -f /dev/null
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 60

  # Phase 2c: Verify emulator ready (timeout safety net)
  verify-emulator-ready:
    command: |
      set -e
      _step="emulator-boot"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      # Wait a moment for launch to start
      sleep 5

      echo "Verifying emulator is ready..."

      # Early failure detection: Check if emulator appears in adb devices
      echo "Checking if emulator is visible to adb..."
      initial_wait=30
      elapsed=0
      emulator_detected=false

      while [ $elapsed -lt $initial_wait ]; do
        if adb devices 2>/dev/null | grep -q "emulator-"; then
          emulator_detected=true
          echo "✓ Emulator detected by adb"
          break
        fi
        sleep 2
        elapsed=$((elapsed + 2))
      done

      if [ "$emulator_detected" = false ]; then
        echo ""
        echo "ERROR: Emulator not visible to adb after ${initial_wait}s" >&2
        echo ""
        echo "This usually means:" >&2
        echo "  1. Device filtering removed all devices (check sync-avds logs)" >&2
        echo "  2. Emulator startup command failed (check android-emulator logs)" >&2
        echo "  3. System images not available for selected device" >&2
        echo ""
        echo "Check process-compose logs above for error details" >&2
        printf 'fail\nEmulator not detected - check filtering and device availability\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      # Now wait for emulator to be fully booted and ready
      echo ""
      echo "Emulator process running, waiting for device to be ready..."
      max_wait=300
      elapsed=0
      while ! android.sh emulator ready 2>/dev/null; do
        # Recheck that emulator is still visible to adb (crash detection)
        if ! adb devices 2>/dev/null | grep -q "emulator-"; then
          echo ""
          echo "ERROR: Emulator no longer visible to adb (crashed or terminated)" >&2
          printf 'fail\nEmulator process crashed during boot\n' > "$_step_dir/$_step.status"
          exit 1
        fi

        sleep 3
        elapsed=$((elapsed + 3))
        if [ $elapsed -ge $max_wait ]; then
          printf 'fail\nTimed out after 300s waiting for emulator to boot\n' > "$_step_dir/$_step.status"
          exit 1
        fi
      done
      echo "Emulator ready"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Deploy app - depends on both build and emulator being ready
  deploy-app:
    command: |
      set -e
      _step="deploy-app"
      _step_dir="reports/steps"
      _logs_dir="reports/logs"
      mkdir -p "$_step_dir" "$_logs_dir"

      # Check if emulator boot succeeded
      if [ -f "$_step_dir/emulator-boot.status" ]; then
        boot_status=$(head -n1 "$_step_dir/emulator-boot.status")
        if [ "$boot_status" = "fail" ]; then
          echo "ERROR: Emulator boot failed, cannot deploy" >&2
          cat "$_step_dir/emulator-boot.status"
          printf 'fail\nEmulator boot failed - skipping deploy\n' > "$_step_dir/$_step.status"
          exit 1
        fi
      else
        echo "ERROR: Emulator boot status not found" >&2
        printf 'fail\nEmulator boot status missing\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      serial="${ANDROID_EMULATOR_SERIAL:-emulator-${EMU_PORT:-5554}}"

      # Capture emulator state before deploy
      echo "=== Pre-deploy emulator state ==="
      echo "Serial: $serial"
      adb -s "$serial" get-state 2>&1 || echo "WARNING: adb get-state failed"
      echo "Emulator uptime:"
      adb -s "$serial" shell uptime 2>&1 || echo "WARNING: uptime failed"
      echo ""

      # Deploy (allow failure so we can capture diagnostics)
      set +e
      deploy_exit=0
      android.sh deploy || deploy_exit=$?
      set -e

      if [ "$deploy_exit" -ne 0 ]; then
        echo ""
        echo "=== Deploy failed (exit $deploy_exit) - capturing diagnostics ==="
        echo ""

        # Check emulator is still responsive
        echo "--- Emulator responsiveness ---"
        adb -s "$serial" get-state 2>&1 || echo "ERROR: Emulator not responding to adb"
        echo ""

        # Check if the app package is installed
        echo "--- Installed packages matching com.example ---"
        adb -s "$serial" shell pm list packages 2>/dev/null | grep "example" || echo "(none found)"
        echo ""

        # Try launching manually and capture am start output
        echo "--- Manual am start attempt ---"
        adb -s "$serial" shell am start -n "com.example.devbox/.MainActivity" 2>&1 || true
        sleep 3
        echo ""

        # Check for the process
        echo "--- Process check (pidof) ---"
        pid=$(adb -s "$serial" shell pidof com.example.devbox 2>&1 || true)
        if [ -n "$pid" ]; then
          echo "Process IS running: pid=$pid"
          echo "(The deploy script's check may have been too early)"
        else
          echo "Process NOT running"
          echo ""
          echo "--- Checking for recent crashes ---"
          adb -s "$serial" shell "dumpsys activity processes | grep -A5 'com.example.devbox'" 2>&1 || true
        fi
        echo ""

        # Capture logcat filtered to app
        echo "--- App logcat (last 100 lines) ---"
        adb -s "$serial" logcat -d -t 100 --pid="$(adb -s "$serial" shell pidof com.example.devbox 2>/dev/null || echo 0)" 2>&1 | tail -50 || true
        echo ""

        echo "--- Crash/fatal logcat ---"
        adb -s "$serial" logcat -d -s AndroidRuntime:E 2>&1 | tail -30 || true
        echo ""

        # Save full logcat to reports
        echo "Saving full logcat to $_logs_dir/logcat-deploy-failure.txt"
        adb -s "$serial" logcat -d > "$_logs_dir/logcat-deploy-failure.txt" 2>&1 || true

        # Save bugreport-style info
        echo "Saving device info to $_logs_dir/device-info.txt"
        {
          echo "=== Device Properties ==="
          adb -s "$serial" shell getprop 2>&1 || true
          echo ""
          echo "=== Memory Info ==="
          adb -s "$serial" shell cat /proc/meminfo 2>&1 | head -20 || true
          echo ""
          echo "=== Disk Space ==="
          adb -s "$serial" shell df -h 2>&1 || true
        } > "$_logs_dir/device-info.txt" 2>&1

        printf 'fail\nDeploy failed with exit code %d\n' "$deploy_exit" > "$_step_dir/$_step.status"
        exit 1
      fi

      # Deploy succeeded - verify app stays running
      echo ""
      echo "Waiting for app to stabilize..."
      max_attempts=10
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if android.sh app status; then
          echo "App is running (verified after ${attempt}s)"
          break
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts..."
        sleep 2
      done

      if [ $attempt -ge $max_attempts ]; then
        echo ""
        echo "=== App not stable after deploy - capturing diagnostics ==="
        adb -s "$serial" logcat -d -s AndroidRuntime:E 2>&1 | tail -30 || true
        adb -s "$serial" logcat -d > "$_logs_dir/logcat-deploy-unstable.txt" 2>&1 || true
        echo "Logcat saved to: $_logs_dir/logcat-deploy-unstable.txt"
        printf 'fail\nApp did not stay running within timeout\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      # Soak period — verify app survives for 10 seconds
      echo "App process confirmed, starting soak period (10s)..."
      sleep 10

      if ! android.sh app status; then
        echo "FAIL: App crashed during soak period"
        adb -s "$serial" logcat -d > "$_logs_dir/logcat-soak-crash.txt" 2>&1 || true
        adb -s "$serial" logcat -d -s AndroidRuntime:E > "$_logs_dir/logcat-crash-fatal.txt" 2>&1 || true
        echo "Logcat saved to: $_logs_dir/logcat-soak-crash.txt"
        echo "Crash logs: $_logs_dir/logcat-crash-fatal.txt"
        printf 'fail\nApp crashed during soak period\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      # Save full logcat for offline analysis
      adb -s "$serial" logcat -d > "$_logs_dir/logcat-final.txt" 2>&1 || true

      # Scan for crash patterns scoped to our app process only
      APP_PID=$(adb -s "$serial" shell pidof "${ANDROID_APP_ID}" 2>/dev/null || true)
      if [ -n "$APP_PID" ]; then
        adb -s "$serial" logcat -d --pid="$APP_PID" > "$_logs_dir/logcat-app.txt" 2>&1 || true
      else
        grep -F "${ANDROID_APP_ID}" "$_logs_dir/logcat-final.txt" > "$_logs_dir/logcat-app.txt" 2>/dev/null || true
      fi

      crash_patterns="FATAL EXCEPTION|AndroidRuntime.*FATAL"
      if grep -qiE "$crash_patterns" "$_logs_dir/logcat-app.txt" 2>/dev/null; then
        echo ""
        echo "FAIL: Crash patterns detected in app logcat"
        echo "--- Error lines ---"
        grep -iE "$crash_patterns" "$_logs_dir/logcat-app.txt" | tail -20
        echo "---"
        echo "Full logcat: $_logs_dir/logcat-final.txt"
        printf 'fail\nCrash patterns detected in logcat\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      echo "pass" > "$_step_dir/$_step.status"
      echo "App verified healthy (process alive, no crashes detected)"
      echo "Logcat saved to: $_logs_dir/logcat-final.txt"
    depends_on:
      build-app:
        condition: process_completed_successfully
      verify-emulator-ready:
        condition: process_completed
    availability:
      restart: "no"

  # Cleanup - capture final logs, then stop everything in pure mode
  cleanup-app:
    command: |
      _step_dir="reports/steps"
      _logs_dir="reports/logs"
      mkdir -p "$_logs_dir"

      # Check if deployment succeeded
      deploy_failed=false
      if [ -f "$_step_dir/deploy-app.status" ]; then
        deploy_status=$(head -n1 "$_step_dir/deploy-app.status")
        if [ "$deploy_status" = "fail" ]; then
          deploy_failed=true
          echo "Deploy failed, skipping adb operations"
        fi
      fi

      # Only capture logs if deployment succeeded
      if [ "$deploy_failed" = false ]; then
        serial="${ANDROID_EMULATOR_SERIAL:-emulator-${EMU_PORT:-5554}}"
        # Use timeout to prevent hanging
        timeout 10s adb -s "$serial" logcat -d > "$_logs_dir/logcat-cleanup.txt" 2>&1 || true
        echo "Final logcat: $_logs_dir/logcat-cleanup.txt"
      fi

      # Stop emulator (only in pure mode)
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        android.sh app stop || true
        android.sh emulator stop || true
        echo "Cleanup complete"
      fi
    depends_on:
      deploy-app:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - reports per-step pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "Android E2E Test Suite"
      e2e_report_steps setup-sdk build-app emulator-boot deploy-app || true
      test_summary "android-e2e"
    depends_on:
      cleanup-app:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
