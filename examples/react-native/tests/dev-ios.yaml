version: "0.5"

# Development mode: Fast iteration with hot reload
# - Uses Debug build for faster compilation
# - Reuses existing simulator if available
# - Keeps Metro and simulator running for hot reload
# - TUI enabled for interactive development

environment:
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "SUITE_NAME=rn-ios-dev"
  - "BOOT_TIMEOUT=120"
  - "ANDROID_SKIP_SETUP=1"
  - "LANG=en_US.UTF-8"
  - "LC_ALL=en_US.UTF-8"
  - "REACT_NATIVE_VIRTENV=${REACT_NATIVE_VIRTENV}"

log_location: "reports/react-native-ios-dev-logs"
log_level: info
is_strict: false  # Allow graceful exit

processes:
  # Phase 1: Build Node dependencies
  build-node:
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2: Install CocoaPods dependencies
  install-pods:
    command: |
      cd ios
      echo "Installing CocoaPods dependencies..."
      pod install --repo-update
      echo 'Pod install complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync simulators
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4: Start simulator (reuses if already running)
  ios-simulator:
    command: |
      echo "Starting iOS simulator (${IOS_DEVICE})..."
      ios.sh simulator start ${IOS_DEVICE}
      echo "Simulator ready for development"
      echo "Simulator will remain running for hot reload"
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 120
      success_threshold: 1
      failure_threshold: 3

  # Phase 5: Start Metro bundler with hot reload
  metro-bundler:
    command: "metro.sh start ios"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "on_failure"
      max_restarts: 3
    shutdown:
      command: "metro.sh stop ios || true"
      signal: 15
      timeout_seconds: 5
    readiness_probe:
      exec:
        command: "metro.sh health ios ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 60
      success_threshold: 1

  # Phase 6: Build and deploy app (Debug for fast iteration)
  deploy-ios:
    command: |
      set -e

      BUILD_CONFIG="${IOS_BUILD_CONFIG:-Debug}"
      echo "Building React Native app (${BUILD_CONFIG})"

      . ${REACT_NATIVE_VIRTENV}/metro/env-ios.sh
      echo "Metro port: $METRO_PORT"

      # Build with ios.sh build
      NODE_BINARY="$NODE_BINARY" RCT_METRO_PORT="$METRO_PORT" \
        ios.sh build --config "$BUILD_CONFIG" --quiet

      # Deploy to simulator
      ios.sh deploy

      echo ""
      echo "App deployed and running!"
      echo "  Metro: http://localhost:$METRO_PORT"
      echo "  Hot reload enabled - edit code and save to see changes"
    depends_on:
      install-pods:
        condition: process_completed_successfully
      ios-simulator:
        condition: process_healthy
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"
