version: "0.5"

environment:
  - "TEST_TUI=${TEST_TUI:-false}"
  - "WEB_PORT=8081"

log_location: "reports/react-native-web-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 0: Allocate Metro port
  allocate-metro-port:
    command: |
      set -e
      # Source React Native lib
      . ${REACT_NATIVE_VIRTENV}/scripts/lib/lib.sh

      # Allocate port for web test suite
      metro_port=$(rn_allocate_metro_port "web")
      echo "📡 Allocated Metro port: $metro_port"

      # Save environment file for other processes
      env_file=$(rn_save_metro_env "web" "$metro_port")
      echo "✓ Metro environment saved to: $env_file"
    availability:
      restart: "no"

  # Phase 1: Build Node dependencies
  build-node:
    depends_on:
      allocate-metro-port:
        condition: process_completed_successfully
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2: Build web bundle directory
  build-web:
    command: |
      echo '📦 Creating web build directory...'
      mkdir -p web/build
      echo '✓ Web build directory ready'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Start Metro bundler
  metro-bundler:
    command: "metro.sh start web"
    depends_on:
      allocate-metro-port:
        condition: process_completed_successfully
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"
    shutdown:
      command: "metro.sh stop web || true"
      signal: 15
      timeout_seconds: 5
    readiness_probe:
      exec:
        command: "metro.sh health web ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 4: Verify web app is being served
  verify-web-serving:
    command: |
      # Source Metro environment to get correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-web.sh

      echo "Verifying web app is being served on port $METRO_PORT..."

      # Use node to make HTTP request (curl may not be available in --pure)
      node -e "
        const http = require('http');
        const url = 'http://localhost:' + process.env.METRO_PORT;
        http.get(url, (res) => {
          let data = '';
          res.on('data', (chunk) => data += chunk);
          res.on('end', () => {
            if (res.statusCode === 200) {
              console.log('✓ Web app is being served (HTTP ' + res.statusCode + ')');
              console.log('  Response size: ' + data.length + ' bytes');
              require('fs').mkdirSync('reports', { recursive: true });
              require('fs').writeFileSync('reports/.e2e-passed', '');
              process.exit(0);
            } else {
              console.error('ERROR: Unexpected status code: ' + res.statusCode);
              process.exit(1);
            }
          });
        }).on('error', (err) => {
          console.error('ERROR: Could not connect to Metro: ' + err.message);
          process.exit(1);
        });
      "
    depends_on:
      metro-bundler:
        condition: process_healthy
      build-web:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup
  cleanup:
    command: |
      echo "Stopping Metro bundler..."
      metro.sh stop web || true
      echo "✓ Test complete"
    depends_on:
      verify-web-serving:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - always runs, checks marker file for pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native Web E2E Test Suite"
      assert_file_exists "reports/.e2e-passed" "E2E pipeline completed"
      rm -f reports/.e2e-passed
      test_summary "rn-web-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
