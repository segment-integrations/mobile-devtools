version: "0.5"

# Development mode: Fast iteration with hot reload
# - Uses Debug build for faster compilation
# - Reuses existing emulator if available
# - Keeps Metro and emulator running for hot reload
# - TUI enabled for interactive development

environment:
  - "SUITE_NAME=rn-android-dev"

log_location: "reports/react-native-android-dev-logs"
log_level: info
is_strict: false  # Allow graceful exit

processes:
  # Phase 1: Build Node dependencies
  build-node:
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2: Build Android app (Debug)
  build-android:
    command: |
      BUILD_CONFIG="${ANDROID_BUILD_CONFIG:-Debug}"
      echo "Building Android app (${BUILD_CONFIG})..."
      android.sh build --config "$BUILD_CONFIG"
      echo 'Build complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync AVDs
  sync-avds:
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 4: Start emulator (reuses if already running)
  android-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    command: |
      device="${ANDROID_DEFAULT_DEVICE:-max}"
      echo "Starting emulator: $device"
      android.sh emulator start "$device"
      # Keep process alive for readiness probe (process-compose services pattern)
      tail -f /dev/null
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 24

  # Phase 5: Start Metro bundler with hot reload
  metro-bundler:
    command: "metro.sh start android"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "on_failure"
      max_restarts: 3
    shutdown:
      command: "metro.sh stop android || true"
      signal: 15
      timeout_seconds: 5
    readiness_probe:
      exec:
        command: "metro.sh health android android"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 6: Deploy app (Debug build for fast iteration)
  deploy-android:
    command: |
      . ${REACT_NATIVE_VIRTENV}/metro/env-android.sh
      echo "Deploying React Native app (Debug, Metro port: $METRO_PORT)..."

      # Deploy using android.sh (APK already built by build-android)
      android.sh deploy

      echo ""
      echo "App deployed!"
      echo "  Metro: http://localhost:$METRO_PORT"
      echo "  Hot reload enabled - edit code and save to see changes"
    depends_on:
      build-android:
        condition: process_completed_successfully
      android-emulator:
        condition: process_healthy
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"
