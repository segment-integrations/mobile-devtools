version: "0.5"

environment:
  - "SUITE_NAME=rn-android-e2e"
  - "TEST_TUI=${TEST_TUI:-false}"

log_location: "reports/react-native-android-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase -1: Setup - evaluate Android SDK (warms Nix cache)
  setup-sdk:
    environment:
      - "IOS_SKIP_SETUP=1"
    command: |
      set -e
      . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh
      echo "✅ Android SDK ready: ${ANDROID_SDK_ROOT:-not set}"
    availability:
      restart: "no"

  # Phase 0: Allocate Metro port (no running process needed for builds)
  allocate-metro-port:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: |
      set -e
      # Source React Native lib
      . ${REACT_NATIVE_VIRTENV}/scripts/lib/lib.sh

      # Allocate port for android test suite
      metro_port=$(rn_allocate_metro_port "android")
      echo "Allocated Metro port: $metro_port"

      # Save environment file for other processes
      env_file=$(rn_save_metro_env "android" "$metro_port")
      echo "Metro environment saved to: $env_file"
    availability:
      restart: "no"

  # Phase 1: Build Node dependencies
  build-node:
    command: |
      set -e
      _step="build-node"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      npm install

      echo "pass" > "$_step_dir/$_step.status"
    availability:
      restart: "no"

  # Phase 2: Build Android app (depends on port allocation, NOT metro running)
  build-android:
    command: |
      set -e
      _step="build-android"
      _step_dir="$PWD/reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      # Source SDK setup (process-compose processes have isolated environments)
      . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh

      # Source Metro environment so build knows correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-android.sh
      echo "Metro port for build: $METRO_PORT"

      BUILD_CONFIG="${ANDROID_BUILD_CONFIG:-Debug}"
      echo "Building Android app (${BUILD_CONFIG})..."
      cd android
      ./gradlew assemble${BUILD_CONFIG} -PreactNativeDevServerPort="$METRO_PORT"
      echo 'Build complete'

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      build-node:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync AVDs
  sync-avds:
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 4a: Launch emulator if not running
  launch-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      set -e
      device="${ANDROID_DEFAULT_DEVICE:-max}"

      # Check if emulator already running
      if android.sh emulator ready 2>/dev/null; then
        echo "Emulator already running, skipping launch"
        exit 0
      fi

      echo "[ANDROID-EMULATOR] Starting emulator..."
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        # Pure mode: foreground, process-compose manages lifecycle
        echo "Starting fresh Android emulator (pure mode): $device"
        android.sh emulator start --pure "$device"
        tail -f /dev/null  # Keep alive
      else
        # Dev mode: start emulator, wait for ready, then detach
        echo "Starting Android emulator: $device"
        unset ANDROID_EMULATOR_FOREGROUND
        android.sh emulator start --wait-ready "$device"
      fi
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 60

  # Phase 4b: Verify emulator ready
  verify-emulator-ready:
    command: |
      _step="emulator-boot"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      # Wait a moment for launch to start
      sleep 5

      echo "Verifying emulator is ready..."
      max_wait=300
      elapsed=0
      while ! android.sh emulator ready 2>/dev/null; do
        sleep 3
        elapsed=$((elapsed + 3))
        echo "  Waiting for emulator... ${elapsed}s/${max_wait}s"
        if [ $elapsed -ge $max_wait ]; then
          printf 'fail\nTimed out after %ds waiting for emulator to boot\n' "$max_wait" > "$_step_dir/$_step.status"
          exit 1
        fi
      done
      echo "Emulator ready"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 5: Start Metro bundler
  metro-bundler:
    command: "metro.sh start android"
    depends_on:
      build-node:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health android android"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 6: Deploy app
  deploy-android:
    command: |
      set -e
      _step="deploy"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-android.sh
      echo "Metro port: $METRO_PORT"

      # Setup ADB reverse port forwarding so app can reach Metro
      # React Native apps connect to localhost:8081 by default, forward to actual Metro port
      serial=""
      state_dir="${ANDROID_RUNTIME_DIR:-.devbox/virtenv}/${SUITE_NAME:-default}"
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi

      echo "Setting up Metro port forwarding: 8081 -> $METRO_PORT (serial: $serial)"

      # Remove any existing reverse on port 8081
      adb -s "$serial" reverse --remove tcp:8081 2>/dev/null || true

      # Set up new reverse
      adb -s "$serial" reverse tcp:8081 tcp:$METRO_PORT

      # Verify reverse is active
      echo "Verifying port forwarding..."
      adb -s "$serial" reverse --list

      # Deploy using android.sh (APK already built by build-android)
      android.sh deploy

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      build-android:
        condition: process_completed_successfully
      verify-emulator-ready:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7: Verify app is running and connected to Metro
  verify-app-running:
    command: |
      _step="verify-app"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      echo "Waiting for app to start and connect to Metro..."

      # Resolve emulator serial for log checking
      state_dir="${ANDROID_RUNTIME_DIR:-.devbox/virtenv}/${SUITE_NAME:-default}"
      serial=""
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi
      echo "  Serial: $serial"

      max_attempts=20
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        # Check if app process is running using built-in command
        if ! android.sh app status; then
          attempt=$((attempt + 1))
          echo "  Attempt $attempt/$max_attempts: App not running yet..."
          sleep 2
          continue
        fi

        echo "  App process is running, waiting 5 seconds for startup..."
        sleep 5

        echo "  Checking logs for errors..."

        # Get recent logs from ALL tags (not just ReactNative), more lines
        log_output=$(adb -s "$serial" logcat -d -t 500 2>/dev/null || true)

        # Check for Metro connection errors (these appear in red box)
        if echo "$log_output" | grep -qi "unable.*load.*script\|could.*not.*connect.*metro\|connection.*refused.*8081\|packaged.*correctly.*for.*release"; then
          echo "ERROR: App cannot connect to Metro bundler:" >&2
          echo "$log_output" | grep -iE "unable|load|script|connect|metro|refused|8081|packaged|release|bundle" | tail -30 >&2
          echo "" >&2
          echo "Full recent logs:" >&2
          echo "$log_output" | tail -50 >&2
          printf 'fail\nApp cannot connect to Metro bundler\n' > "$_step_dir/$_step.status"
          exit 1
        fi

        # Check for other fatal errors
        if echo "$log_output" | grep -qi "fatal.*error\|exception.*error"; then
          echo "ERROR: App encountered fatal errors:" >&2
          echo "$log_output" | grep -iE "fatal|exception" | tail -20 >&2
          printf 'fail\nApp encountered fatal errors\n' > "$_step_dir/$_step.status"
          exit 1
        fi

        # Success: app is running and no errors
        echo "App is running and connected to Metro"
        echo "pass" > "$_step_dir/$_step.status"
        exit 0
      done

      printf 'fail\nApp did not start within timeout\n' > "$_step_dir/$_step.status"
      exit 1
    depends_on:
      deploy-android:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop android || true
        android.sh app stop || true
        android.sh emulator stop || true
        echo "Metro, app, and emulator stopped"
      else
        echo "Test complete - Metro, app, and emulator still running for iteration"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - reports per-step pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native Android E2E Test Suite"
      e2e_report_steps || true
      test_summary "rn-android-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
