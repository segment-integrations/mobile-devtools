version: "0.5"

environment:
  - "SUITE_NAME=rn-android-e2e"
  - "TEST_TUI=${TEST_TUI:-false}"

log_location: "reports/react-native-android-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase -1: Setup - evaluate Android SDK and write path for sibling processes
  setup-sdk:
    environment:
      - "IOS_SKIP_SETUP=1"
    command: |
      set -e
      _step="setup-sdk"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh

      # Fallback: detect from adb in PATH
      if [ -z "${ANDROID_SDK_ROOT:-}" ]; then
        adb_path="$(command -v adb 2>/dev/null || true)"
        if [ -n "$adb_path" ]; then
          sdk_candidate="$(cd "$(dirname "$adb_path")/.." && pwd)"
          if [ -d "$sdk_candidate/platform-tools" ]; then
            ANDROID_SDK_ROOT="$sdk_candidate"
            export ANDROID_SDK_ROOT ANDROID_HOME="$ANDROID_SDK_ROOT"
          fi
        fi
      fi

      mkdir -p "${ANDROID_RUNTIME_DIR}/.state"
      echo "${ANDROID_SDK_ROOT:-}" > "${ANDROID_RUNTIME_DIR}/.state/sdk_root"

      if [ -n "${ANDROID_SDK_ROOT:-}" ]; then
        echo "✅ Android SDK ready: ${ANDROID_SDK_ROOT}"
        echo "pass" > "$_step_dir/$_step.status"
      else
        echo "❌ Android SDK setup failed: ANDROID_SDK_ROOT not set" >&2
        printf 'fail\nANDROID_SDK_ROOT not set after setup\n' > "$_step_dir/$_step.status"
        exit 1
      fi
    availability:
      restart: "no"

  # Phase 0: Allocate Metro port (no running process needed for builds)
  allocate-metro-port:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: |
      set -e
      # Source React Native lib
      . ${REACT_NATIVE_VIRTENV}/scripts/lib/lib.sh

      # Allocate port for android test suite
      metro_port=$(rn_allocate_metro_port "android")
      echo "Allocated Metro port: $metro_port"

      # Save environment file for other processes
      env_file=$(rn_save_metro_env "android" "$metro_port")
      echo "Metro environment saved to: $env_file"
    availability:
      restart: "no"

  # Phase 1: Build Node dependencies
  build-node:
    command: |
      set -e
      _step="build-node"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      npm install

      echo "pass" > "$_step_dir/$_step.status"
    availability:
      restart: "no"

  # Phase 2: Build Android app (depends on port allocation, NOT metro running)
  build-android:
    command: |
      set -e
      _step="build-android"
      _step_dir="$PWD/reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      # Read SDK root from setup-sdk (process-compose processes have isolated envs)
      if [ -z "${ANDROID_SDK_ROOT:-}" ] && [ -f "${ANDROID_RUNTIME_DIR}/.state/sdk_root" ]; then
        ANDROID_SDK_ROOT="$(cat "${ANDROID_RUNTIME_DIR}/.state/sdk_root")"
        ANDROID_HOME="$ANDROID_SDK_ROOT"
        export ANDROID_SDK_ROOT ANDROID_HOME
      fi

      # Source Metro environment so build knows correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-android.sh
      echo "Metro port for build: $METRO_PORT"

      BUILD_CONFIG="${ANDROID_BUILD_CONFIG:-Debug}"
      echo "Building Android app (${BUILD_CONFIG})..."
      cd android
      ./gradlew assemble${BUILD_CONFIG} -PreactNativeDevServerPort="$METRO_PORT"
      echo 'Build complete'

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      build-node:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync AVDs
  sync-avds:
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 4a: Launch emulator if not running
  launch-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      set -e
      device="${ANDROID_DEFAULT_DEVICE:-max}"

      # Check if emulator already running
      if android.sh emulator ready 2>/dev/null; then
        echo "Emulator already running, skipping launch"
        exit 0
      fi

      echo "[ANDROID-EMULATOR] Starting emulator..."
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        # Pure mode: foreground, process-compose manages lifecycle
        echo "Starting fresh Android emulator (pure mode): $device"
        android.sh emulator start --pure "$device"
        tail -f /dev/null  # Keep alive
      else
        # Dev mode: start emulator, wait for ready, then detach
        echo "Starting Android emulator: $device"
        unset ANDROID_EMULATOR_FOREGROUND
        android.sh emulator start --wait-ready "$device"
      fi
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 60

  # Phase 4b: Verify emulator ready
  verify-emulator-ready:
    command: |
      _step="emulator-boot"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      # Wait a moment for launch to start
      sleep 5

      echo "Verifying emulator is ready..."
      max_wait=300
      elapsed=0
      while ! android.sh emulator ready 2>/dev/null; do
        sleep 3
        elapsed=$((elapsed + 3))
        echo "  Waiting for emulator... ${elapsed}s/${max_wait}s"
        if [ $elapsed -ge $max_wait ]; then
          printf 'fail\nTimed out after %ds waiting for emulator to boot\n' "$max_wait" > "$_step_dir/$_step.status"
          exit 1
        fi
      done
      echo "Emulator ready"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 5: Start Metro bundler
  metro-bundler:
    command: "metro.sh start android"
    depends_on:
      build-node:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health android android"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 6: Deploy app
  deploy-android:
    command: |
      _step="deploy"
      _step_dir="reports/steps"
      _logs_dir="reports/logs"
      mkdir -p "$_step_dir" "$_logs_dir"

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-android.sh
      echo "Metro port: $METRO_PORT"

      # Setup ADB reverse port forwarding so app can reach Metro
      serial=""
      state_dir="${ANDROID_RUNTIME_DIR:-.devbox/virtenv}/${SUITE_NAME:-default}"
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi

      echo "Setting up Metro port forwarding: 8081 -> $METRO_PORT (serial: $serial)"

      # Remove any existing reverse on port 8081
      adb -s "$serial" reverse --remove tcp:8081 2>/dev/null || true

      # Set up new reverse
      adb -s "$serial" reverse tcp:8081 tcp:$METRO_PORT

      # Verify reverse is active
      echo "Verifying port forwarding..."
      adb -s "$serial" reverse --list

      # Capture emulator state before deploy
      echo ""
      echo "=== Pre-deploy emulator state ==="
      echo "Serial: $serial"
      adb -s "$serial" get-state 2>&1 || echo "WARNING: adb get-state failed"
      echo "Emulator uptime:"
      adb -s "$serial" shell uptime 2>&1 || echo "WARNING: uptime failed"
      echo ""

      # Deploy (allow failure so we can capture diagnostics)
      deploy_exit=0
      android.sh deploy || deploy_exit=$?

      if [ "$deploy_exit" -ne 0 ]; then
        echo ""
        echo "=== Deploy failed (exit $deploy_exit) - capturing diagnostics ==="
        echo ""

        # Check emulator is still responsive
        echo "--- Emulator responsiveness ---"
        adb -s "$serial" get-state 2>&1 || echo "ERROR: Emulator not responding to adb"
        echo ""

        # Check if the app package is installed
        echo "--- Installed packages matching app ---"
        adb -s "$serial" shell pm list packages 2>/dev/null | grep -i "devbox\|example\|reactnative" || echo "(none found)"
        echo ""

        # Try launching manually and capture am start output
        echo "--- Manual am start attempt ---"
        adb -s "$serial" shell am start -n "com.devboxreactnativeexample/.MainActivity" 2>&1 || true
        sleep 3
        echo ""

        # Check for the process
        echo "--- Process check (pidof) ---"
        pid=$(adb -s "$serial" shell pidof com.devboxreactnativeexample 2>&1 || true)
        if [ -n "$pid" ]; then
          echo "Process IS running: pid=$pid"
          echo "(The deploy script's check may have been too early)"
        else
          echo "Process NOT running"
          echo ""
          echo "--- Checking for recent crashes ---"
          adb -s "$serial" shell "dumpsys activity processes | grep -A5 'com.devboxreactnativeexample'" 2>&1 || true
        fi
        echo ""

        echo "--- Crash/fatal logcat ---"
        adb -s "$serial" logcat -d -s AndroidRuntime:E 2>&1 | tail -30 || true
        echo ""

        # Save full logcat to reports
        echo "Saving full logcat to $_logs_dir/logcat-deploy-failure.txt"
        adb -s "$serial" logcat -d > "$_logs_dir/logcat-deploy-failure.txt" 2>&1 || true

        # Save device info
        echo "Saving device info to $_logs_dir/device-info.txt"
        {
          echo "=== Device Properties ==="
          adb -s "$serial" shell getprop 2>&1 || true
          echo ""
          echo "=== Memory Info ==="
          adb -s "$serial" shell cat /proc/meminfo 2>&1 | head -20 || true
          echo ""
          echo "=== Disk Space ==="
          adb -s "$serial" shell df -h 2>&1 || true
        } > "$_logs_dir/device-info.txt" 2>&1

        printf 'fail\nDeploy failed with exit code %d\n' "$deploy_exit" > "$_step_dir/$_step.status"
        exit 1
      fi

      # Deploy succeeded - verify app stays running
      echo ""
      echo "Waiting for app to stabilize..."
      max_attempts=10
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if android.sh app status; then
          echo "App is running (verified after ${attempt}s)"
          adb -s "$serial" logcat -d > "$_logs_dir/logcat-deploy-success.txt" 2>&1 || true
          echo "pass" > "$_step_dir/$_step.status"
          exit 0
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts..."
        sleep 2
      done

      # App not stable after deploy
      echo ""
      echo "=== App not stable after deploy - capturing diagnostics ==="
      adb -s "$serial" logcat -d -s AndroidRuntime:E 2>&1 | tail -30 || true
      adb -s "$serial" logcat -d > "$_logs_dir/logcat-deploy-unstable.txt" 2>&1 || true

      printf 'fail\nApp did not stay running within timeout\n' > "$_step_dir/$_step.status"
      exit 1
    depends_on:
      build-android:
        condition: process_completed_successfully
      verify-emulator-ready:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7: Verify app is running and connected to Metro
  verify-app-running:
    command: |
      _step="verify-app"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      echo "Waiting for app to start and connect to Metro..."

      # Resolve emulator serial for log checking
      state_dir="${ANDROID_RUNTIME_DIR:-.devbox/virtenv}/${SUITE_NAME:-default}"
      serial=""
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi
      echo "  Serial: $serial"

      max_attempts=20
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        # Check if app process is running using built-in command
        if ! android.sh app status; then
          attempt=$((attempt + 1))
          echo "  Attempt $attempt/$max_attempts: App not running yet..."
          sleep 2
          continue
        fi

        echo "  App process is running, waiting 5 seconds for startup..."
        sleep 5

        echo "  Checking logs for errors..."

        # Get recent logs from ALL tags (not just ReactNative), more lines
        log_output=$(adb -s "$serial" logcat -d -t 500 2>/dev/null || true)

        # Check for Metro connection errors (these appear in red box)
        if echo "$log_output" | grep -qi "unable.*load.*script\|could.*not.*connect.*metro\|connection.*refused.*8081\|packaged.*correctly.*for.*release"; then
          echo "ERROR: App cannot connect to Metro bundler:" >&2
          echo "$log_output" | grep -iE "unable|load|script|connect|metro|refused|8081|packaged|release|bundle" | tail -30 >&2
          echo "" >&2
          echo "Full recent logs:" >&2
          echo "$log_output" | tail -50 >&2
          printf 'fail\nApp cannot connect to Metro bundler\n' > "$_step_dir/$_step.status"
          exit 1
        fi

        # Check for other fatal errors
        if echo "$log_output" | grep -qi "fatal.*error\|exception.*error"; then
          echo "ERROR: App encountered fatal errors:" >&2
          echo "$log_output" | grep -iE "fatal|exception" | tail -20 >&2
          printf 'fail\nApp encountered fatal errors\n' > "$_step_dir/$_step.status"
          exit 1
        fi

        # Success: app is running and no errors
        echo "App is running and connected to Metro"
        echo "pass" > "$_step_dir/$_step.status"
        exit 0
      done

      printf 'fail\nApp did not start within timeout\n' > "$_step_dir/$_step.status"
      exit 1
    depends_on:
      deploy-android:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop android || true
        android.sh app stop || true
        android.sh emulator stop || true
        echo "Metro, app, and emulator stopped"
      else
        echo "Test complete - Metro, app, and emulator still running for iteration"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
      build-node:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - reports per-step pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native Android E2E Test Suite"
      e2e_report_steps || true
      test_summary "rn-android-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
