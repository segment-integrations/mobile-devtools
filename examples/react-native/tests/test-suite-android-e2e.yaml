version: "0.5"

environment:
  - "SUITE_NAME=rn-android-e2e"
  - "TEST_TUI=${TEST_TUI:-false}"

log_location: "reports/react-native-android-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 1: Build Node dependencies
  build-node:
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2: Build Android app
  build-android:
    command: |
      set -e
      BUILD_CONFIG="${ANDROID_BUILD_CONFIG:-Debug}"
      echo "Building Android app (${BUILD_CONFIG})..."
      android.sh build --config "$BUILD_CONFIG"
      echo 'Build complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync AVDs
  sync-avds:
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 4: Start emulator
  android-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      set -e
      echo "[ANDROID-EMULATOR] Starting emulator..."
      device="${ANDROID_DEFAULT_DEVICE:-max}"

      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Starting fresh Android emulator (pure mode): $device"
        android.sh emulator start --pure "$device"
      else
        echo "Starting Android emulator: $device"
        unset ANDROID_EMULATOR_FOREGROUND
        android.sh emulator start "$device"
      fi
      # Keep process alive for readiness probe (process-compose services pattern)
      tail -f /dev/null
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 24

  # Phase 5: Start Metro bundler
  metro-bundler:
    command: "metro.sh start android"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health android android"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 6: Deploy app
  deploy-android:
    command: |
      set -e
      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-android.sh
      echo "Metro port: $METRO_PORT"

      # Deploy using android.sh (APK already built by build-android)
      android.sh deploy
    depends_on:
      build-android:
        condition: process_completed_successfully
      android-emulator:
        condition: process_healthy
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7: Verify app is running and connected to Metro
  verify-app-running:
    command: |
      # Get app ID and serial
      state_dir="${ANDROID_STATE_DIR:-${ANDROID_USER_HOME:-${HOME}/.local/share/android}}"
      app_id=""
      if [ -f "$state_dir/app-id.txt" ]; then
        app_id="$(cat "$state_dir/app-id.txt")"
      fi
      if [ -z "$app_id" ]; then
        echo "ERROR: No app ID found" >&2
        exit 1
      fi

      serial=""
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi

      echo "Waiting for app to start and connect to Metro..."
      echo "  App ID: $app_id"
      echo "  Serial: $serial"

      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        # Check if app process is running
        if ! android.sh app status; then
          attempt=$((attempt + 1))
          echo "  Attempt $attempt/$max_attempts: App not running yet..."
          sleep 2
          continue
        fi

        echo "  App process is running, checking Metro connection..."

        # Check logcat for Metro connection and errors
        log_output=$(adb -s "$serial" logcat -d -s ReactNativeJS:* ReactNative:* -t 50 2>/dev/null || true)

        # Check for fatal errors
        if echo "$log_output" | grep -qi "fatal\|exception\|error.*metro\|failed.*connect"; then
          echo "ERROR: App encountered errors:" >&2
          echo "$log_output" | grep -i "fatal\|exception\|error\|failed" | tail -10 >&2
          exit 1
        fi

        # Check for successful Metro connection (bundle loaded)
        if echo "$log_output" | grep -qi "running.*application\|bundle.*loaded"; then
          echo "✓ App is running and connected to Metro"
          mkdir -p reports
          touch reports/.e2e-passed
          exit 0
        fi

        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts: Waiting for Metro connection..."
        sleep 2
      done

      echo "ERROR: App started but did not connect to Metro within timeout" >&2
      echo "Recent logs:" >&2
      adb -s "$serial" logcat -d -s ReactNativeJS:* ReactNative:* -t 20 >&2
      exit 1
    depends_on:
      deploy-android:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop android || true
        android.sh app stop || true
        android.sh emulator stop || true
        echo "Metro, app, and emulator stopped"
      else
        echo "Test complete - Metro, app, and emulator still running for iteration"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - always runs, checks marker file for pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native Android E2E Test Suite"
      assert_file_exists "reports/.e2e-passed" "E2E pipeline completed"
      rm -f reports/.e2e-passed
      test_summary "rn-android-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
