version: "0.5"

environment:
  - "TEST_TUI=${TEST_TUI:-false}"
  - "ANDROID_SERIAL=emulator-5554"
  - "TEST_TIMEOUT=300"
  - "BOOT_TIMEOUT=180"

log_location: "reports/react-native-android-e2e-logs"
log_level: info
is_strict: false

processes:
  # Phase 0: Allocate Metro port (runs first, no dependencies)
  allocate-metro-port:
    command: |
      # Source React Native lib
      . ${REACT_NATIVE_VIRTENV}/scripts/lib/lib.sh

      # Allocate port for android test suite
      metro_port=$(rn_allocate_metro_port "android")
      echo "📡 Allocated Metro port: $metro_port"

      # Save environment file for other processes
      env_file=$(rn_save_metro_env "android" "$metro_port")
      echo "✓ Metro environment saved to: $env_file"
    availability:
      restart: "no"

  # Phase 1: Build Node dependencies
  build-node:
    depends_on:
      allocate-metro-port:
        condition: process_completed_successfully
    command: "devbox run --pure build:node"
    availability:
      restart: "no"

  # Phase 2: Build Android app
  build-android:
    command: |
      # Source Android environment
      . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh
      echo '📦 Building Android app...'
      cd android && gradle assembleDebug
      echo '✓ Build complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync AVDs
  sync-avds:
    command: |
      . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh
      echo '🔄 Syncing AVDs with device definitions...'
      android.sh devices sync
      echo '✓ Sync complete'
    availability:
      restart: "no"

  # Phase 4: Start emulator
  android-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      echo "[ANDROID-EMULATOR] Starting emulator..."
      # Source Android environment
      . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh

      device="${ANDROID_DEFAULT_DEVICE:-max}"

      if [ "${IN_NIX_SHELL:-}" = "pure" ]; then
        echo "🚀 Starting fresh Android emulator (pure mode): $device"
        export ANDROID_EMULATOR_PURE=1
        echo "emulator-5554" > ${ANDROID_RUNTIME_DIR}/emulator-serial.txt
        android.sh emulator start "$device"
      else
        echo "🚀 Verifying Android emulator is running: $device"
        serial="emulator-5554"
        echo "$serial" > ${ANDROID_RUNTIME_DIR}/emulator-serial.txt

        if adb devices | grep -q "$serial"; then
          echo "✓ Emulator already running: $serial"
        else
          echo "Starting emulator in background: $device"
          unset ANDROID_EMULATOR_FOREGROUND
          android.sh emulator start "$device" &
          echo "✓ Emulator starting (PID: $!)"
        fi

        echo "Waiting for emulator to boot..."
        max_attempts=60
        attempt=0
        while [ $attempt -lt $max_attempts ]; do
          if adb -s $serial shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
            echo "✓ Emulator ready for testing"
            break
          fi
          attempt=$((attempt + 1))
          sleep 2
        done

        if [ $attempt -ge $max_attempts ]; then
          echo "ERROR: Emulator did not boot within timeout"
          exit 1
        fi

        echo "✓ Emulator will remain running after tests complete"
        exit 0
      fi
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: |
          . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh
          serial=$(cat ${ANDROID_RUNTIME_DIR}/emulator-serial.txt 2>/dev/null || echo "")
          [ -n "$serial" ] && adb -s $serial shell getprop sys.boot_completed 2>/dev/null | grep -q "1"
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 180
      success_threshold: 1
      failure_threshold: 12

  # Phase 5: Start Metro bundler
  metro-bundler:
    command: "metro.sh start android"
    depends_on:
      allocate-metro-port:
        condition: process_completed_successfully
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"
    shutdown:
      command: "metro.sh stop android || true"
      signal: 15
      timeout_seconds: 5
    readiness_probe:
      exec:
        command: "metro.sh health android android"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 60
      success_threshold: 1

  # Phase 6: Deploy app
  deploy-android:
    command: |
      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-android.sh

      echo "📲 Deploying React Native app (Metro port: $METRO_PORT)..."
      npx react-native run-android --no-packager
    depends_on:
      build-android:
        condition: process_completed_successfully
      android-emulator:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7: Verify app is running
  verify-app-running:
    command: |
      . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh
      serial=$(cat ${ANDROID_RUNTIME_DIR}/emulator-serial.txt 2>/dev/null || echo emulator-5554)

      echo "Waiting for app to start..."
      max_attempts=10
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if adb -s $serial shell pidof ${ANDROID_APP_ID:-com.reactnativeexample} >/dev/null 2>&1; then
          echo "✓ App process running (PID: $(adb -s $serial shell pidof ${ANDROID_APP_ID:-com.reactnativeexample}))"
          exit 0
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts..."
        sleep 2
      done

      echo "ERROR: App did not start within timeout" >&2
      exit 1
    depends_on:
      deploy-android:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup
  cleanup:
    command: |
      . ${ANDROID_RUNTIME_DIR}/scripts/init/setup.sh

      serial=$(cat ${ANDROID_RUNTIME_DIR}/emulator-serial.txt 2>/dev/null || echo emulator-5554)

      # Stop Metro bundler explicitly
      echo "Stopping Metro bundler..."
      metro.sh stop android || true

      # Also kill the metro.sh wrapper process
      pkill -f "metro.sh start android" || true

      if [ "${IN_NIX_SHELL:-}" = "pure" ]; then
        echo "🧹 Cleaning up (pure mode)..."
        adb -s $serial shell am force-stop ${ANDROID_APP_ID:-com.reactnativeexample} 2>/dev/null || true
        android.sh emulator stop || true
        echo "✓ App stopped, emulator stopped"
      else
        echo "✓ Test complete - app and emulator still running"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Summary - displays results and optionally stays open
  summary:
    command: "bash tests/test-summary.sh 'React Native Android E2E Test Suite' 'reports/react-native-android-e2e-logs'"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
    shutdown:
      signal: 15
      timeout_seconds: 1
