version: "0.5"

environment:
  - "EMU_HEADLESS=${EMU_HEADLESS:-}"
  - "SUITE_NAME=rn-all-e2e"
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "TEST_TIMEOUT=300"
  - "BOOT_TIMEOUT=180"
  - "TEST_TUI=${TEST_TUI:-false}"

log_location: "reports/react-native-all-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 1: Build Node dependencies (shared by both platforms)
  build-node:
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2a: Android build
  build-android:
    command: |
      echo 'Building Android app...'
      cd android && gradle assembleDebug
      echo 'Build complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 2b: Install CocoaPods (parallel with Android build)
  install-pods:
    command: |
      cd ios
      echo "Installing CocoaPods dependencies..."
      # Strip Nix compiler env vars so CocoaPods uses system compilers
      # (Nix CC can't find iOS SDK for cross-compilation)
      unset CC CXX LD LDFLAGS NIX_CC NIX_CXX NIX_LDFLAGS NIX_CFLAGS_COMPILE NIX_CFLAGS_LINK
      unset NIX_ENFORCE_PURITY NIX_HARDENING_ENABLE
      unset AR NM RANLIB STRIP SDKROOT
      export CC=/usr/bin/clang CXX=/usr/bin/clang++
      pod install --repo-update
      echo 'Pod install complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3a: Sync Android AVDs
  sync-avds:
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 3b: Sync iOS simulators (parallel with Android)
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4a: Start Android emulator
  android-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      echo "[ANDROID-EMULATOR] Starting emulator..."
      device="${ANDROID_DEFAULT_DEVICE:-max}"

      if [ "${IN_NIX_SHELL:-}" = "pure" ] || [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Starting fresh Android emulator (pure mode): $device"
        android.sh emulator start "$device"
      else
        echo "Starting Android emulator: $device"
        unset ANDROID_EMULATOR_FOREGROUND
        android.sh emulator start "$device"

        echo "Emulator will remain running after tests complete"
        exit 0
      fi
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 180
      success_threshold: 1
      failure_threshold: 12

  # Phase 4b: Start iOS simulator (parallel with Android)
  ios-simulator:
    command: |
      ios.sh simulator start ${IOS_DEVICE}

      # In pure mode, keep process alive so cleanup can shut down test simulator
      if [ "${IN_NIX_SHELL:-}" = "pure" ] || [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        tail -f /dev/null
      fi
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 120
      success_threshold: 1
      failure_threshold: 3

  # Phase 5: Start Metro bundler (shared by both platforms)
  metro-bundler:
    command: "metro.sh start all"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"
    shutdown:
      command: "metro.sh stop all || true"
      signal: 15
      timeout_seconds: 5
    readiness_probe:
      exec:
        command: "metro.sh health all ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 60
      success_threshold: 1

  # Phase 6a: Deploy Android app
  deploy-android:
    command: |
      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-all.sh

      echo "Deploying React Native app to Android (Metro port: $METRO_PORT)..."
      npx react-native run-android --no-packager
    depends_on:
      build-android:
        condition: process_completed_successfully
      android-emulator:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 6b: Build and deploy iOS app
  deploy-ios:
    command: |
      set -e

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-all.sh

      echo "Deploying React Native app to iOS (Metro port: $METRO_PORT)..."
      echo "Build configuration: Release"
      npx react-native run-ios --no-packager --configuration Release

      # Deploy to save state for app status/stop
      ios.sh deploy || true
    depends_on:
      install-pods:
        condition: process_completed_successfully
      ios-simulator:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7a: Verify Android app
  verify-android-running:
    command: |
      echo "Waiting for Android app to start..."
      max_attempts=10
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if android.sh app status; then
          echo "Android app is running"
          mkdir -p reports
          touch reports/.e2e-android-passed
          exit 0
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts..."
        sleep 2
      done

      echo "ERROR: Android app did not start within timeout" >&2
      exit 1
    depends_on:
      deploy-android:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 7b: Verify iOS app (parallel with Android)
  verify-ios-running:
    command: |
      echo "Waiting for iOS app to start..."
      max_attempts=10
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if ios.sh app status; then
          echo "iOS app is running"
          mkdir -p reports
          touch reports/.e2e-ios-passed
          exit 0
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts..."
        sleep 2
      done

      echo "ERROR: iOS app did not start within timeout" >&2
      exit 1
    depends_on:
      deploy-ios:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Mark passed - only runs when both platforms verified successfully
  mark-passed:
    command: |
      mkdir -p reports
      touch reports/.e2e-passed
      echo "All platforms verified successfully"
    depends_on:
      verify-android-running:
        condition: process_completed_successfully
      verify-ios-running:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - runs when both platforms complete
  cleanup:
    command: |
      echo "Stopping Metro bundler..."
      metro.sh stop all || true

      if [ "${IN_NIX_SHELL:-}" = "pure" ] || [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."

        # Cleanup Android
        android.sh app stop || true
        android.sh emulator stop || true

        # Cleanup iOS
        ios.sh app stop || true
        ios.sh simulator stop || true

        echo "Both platforms cleaned up"
      else
        echo "Test complete - apps and emulator/simulator still running"
      fi
    depends_on:
      mark-passed:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - always runs, checks marker file for pass/fail
  summary:
    command: "bash tests/test-summary.sh 'React Native All Platforms E2E Test Suite' 'reports/react-native-all-e2e-logs' 'reports/.e2e-passed'"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
