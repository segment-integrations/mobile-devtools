version: "0.5"

environment:
  - "SUITE_NAME=rn-all-e2e"
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "TEST_TUI=${TEST_TUI:-false}"

log_location: "reports/react-native-all-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 1: Build Node dependencies (shared by both platforms)
  build-node:
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2a: Android build
  build-android:
    command: |
      set -e
      BUILD_CONFIG="${ANDROID_BUILD_CONFIG:-Debug}"
      echo "Building Android app (${BUILD_CONFIG})..."
      android.sh build --config "$BUILD_CONFIG"
      echo 'Build complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 2b: Install CocoaPods (parallel with Android build)
  install-pods:
    command: |
      set -e
      cd ios
      echo "Installing CocoaPods dependencies..."
      pod install --repo-update
      echo 'Pod install complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3a: Sync Android AVDs
  sync-avds:
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 3b: Sync iOS simulators (parallel with Android)
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4a: Start Android emulator
  android-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      set -e
      echo "[ANDROID-EMULATOR] Starting emulator..."
      device="${ANDROID_DEFAULT_DEVICE:-max}"

      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        # Pure mode: foreground
        echo "Starting fresh Android emulator (pure mode): $device"
        android.sh emulator start --pure "$device"
        tail -f /dev/null
      else
        # Dev mode: start, wait for ready, then detach
        echo "Starting Android emulator: $device"
        unset ANDROID_EMULATOR_FOREGROUND
        android.sh emulator start --wait-ready "$device"
      fi
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 24

  # Phase 4b: Start iOS simulator (parallel with Android)
  ios-simulator:
    command: |
      set -e
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        # Pure mode: foreground
        ios.sh simulator start --pure ${IOS_DEVICE}
        tail -f /dev/null
      else
        # Dev mode: start, wait for ready, then detach
        ios.sh simulator start --wait-ready ${IOS_DEVICE}
      fi
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 12

  # Phase 5: Start Metro bundler (shared by both platforms)
  metro-bundler:
    command: "metro.sh start all"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health all ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 6a: Deploy Android app
  deploy-android:
    command: |
      set -e
      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-all.sh
      echo "Metro port: $METRO_PORT"

      # Setup ADB reverse port forwarding so app can reach Metro
      # React Native apps connect to localhost:8081 by default, forward to actual Metro port
      serial=""
      state_dir="${ANDROID_RUNTIME_DIR:-.devbox/virtenv}/${SUITE_NAME:-default}"
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi

      echo "Setting up Metro port forwarding: 8081 -> $METRO_PORT (serial: $serial)"
      adb -s "$serial" reverse tcp:8081 tcp:$METRO_PORT

      # Deploy using android.sh (APK already built by build-android)
      android.sh deploy
    depends_on:
      build-android:
        condition: process_completed_successfully
      android-emulator:
        condition: process_healthy
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 6b: Build and deploy iOS app
  deploy-ios:
    command: |
      set -e

      BUILD_CONFIG="${IOS_BUILD_CONFIG:-Debug}"
      echo "Building React Native app (${BUILD_CONFIG})"

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-all.sh
      echo "Metro port: $METRO_PORT"

      # Build with ios.sh build
      NODE_BINARY="$NODE_BINARY" RCT_METRO_PORT="$METRO_PORT" \
        ios.sh build --config "$BUILD_CONFIG" --quiet

      # Deploy to simulator
      ios.sh deploy

      echo "App deployed and launched successfully"
    depends_on:
      install-pods:
        condition: process_completed_successfully
      ios-simulator:
        condition: process_healthy
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7a: Verify Android app
  verify-android-running:
    command: |
      echo "Waiting for Android app to start..."

      # Resolve emulator serial for log checking
      serial=""
      state_dir="${ANDROID_RUNTIME_DIR:-.devbox/virtenv}/${SUITE_NAME:-default}"
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi

      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if ! android.sh app status; then
          attempt=$((attempt + 1))
          echo "  Attempt $attempt/$max_attempts: App not running yet..."
          sleep 2
          continue
        fi

        echo "  App process is running, checking logs for errors..."

        # Check logcat for Metro connection errors
        log_output=$(adb -s "$serial" logcat -d -s ReactNativeJS:* ReactNative:* -t 100 2>/dev/null || true)

        if echo "$log_output" | grep -qi "unable.*load.*script\|could.*not.*connect.*metro\|connection.*refused.*8081"; then
          echo "ERROR: App cannot connect to Metro bundler:" >&2
          echo "$log_output" | grep -iE "unable|load|script|connect|metro|refused|8081" | tail -20 >&2
          exit 1
        fi

        if echo "$log_output" | grep -qi "fatal.*error\|exception.*error"; then
          echo "ERROR: App encountered fatal errors:" >&2
          echo "$log_output" | grep -iE "fatal|exception" | tail -15 >&2
          exit 1
        fi

        echo "✓ Android app is running and connected to Metro"
        mkdir -p reports
        touch reports/.e2e-android-passed
        exit 0
      done

      echo "ERROR: Android app did not start within timeout" >&2
      exit 1
    depends_on:
      deploy-android:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 7b: Verify iOS app (parallel with Android)
  verify-ios-running:
    command: |
      echo "Waiting for iOS app to start..."
      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if ios.sh app status; then
          echo "✓ iOS app is running"
          mkdir -p reports
          touch reports/.e2e-ios-passed
          exit 0
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts: App not running yet..."
        sleep 2
      done

      echo "ERROR: iOS app did not start within timeout" >&2
      exit 1
    depends_on:
      deploy-ios:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Mark passed - only runs when both platforms verified successfully
  mark-passed:
    command: |
      mkdir -p reports
      touch reports/.e2e-passed
      echo "All platforms verified successfully"
    depends_on:
      verify-android-running:
        condition: process_completed_successfully
      verify-ios-running:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - runs when both platforms complete
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop all || true

        # Cleanup Android
        android.sh app stop || true
        android.sh emulator stop || true

        # Cleanup iOS
        ios.sh app stop || true
        ios.sh simulator stop || true

        echo "Metro, apps, and emulator/simulator stopped"
      else
        echo "Test complete - Metro, apps, and emulator/simulator still running for iteration"
      fi
    depends_on:
      mark-passed:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - always runs, checks marker file for pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native All Platforms E2E Test Suite"
      assert_file_exists "reports/.e2e-passed" "E2E pipeline completed"
      rm -f reports/.e2e-passed
      test_summary "rn-all-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
