version: "0.5"

environment:
  - "SUITE_NAME=rn-all-e2e"
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "TEST_TUI=${TEST_TUI:-false}"

log_location: "reports/react-native-all-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase -1: Setup - ensure both Android and iOS environments are ready
  setup-sdk:
    command: |
      set -e
      _step="setup-sdk"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      bash ${ANDROID_RUNTIME_DIR}/scripts/user/setup.sh

      # Source iOS init for sibling processes that need iOS environment
      if [ -n "${IOS_SCRIPTS_DIR:-}" ] && [ -f "${IOS_SCRIPTS_DIR}/init/setup.sh" ]; then
        . "${IOS_SCRIPTS_DIR}/init/setup.sh"
      fi

      # Verify state file was written
      if [ -f "${ANDROID_RUNTIME_DIR}/.state/sdk_root" ]; then
        sdk_root="$(cat "${ANDROID_RUNTIME_DIR}/.state/sdk_root")"
        if [ -n "$sdk_root" ]; then
          echo "pass" > "$_step_dir/$_step.status"
        else
          printf 'fail\nANDROID_SDK_ROOT not set after setup\n' > "$_step_dir/$_step.status"
          exit 1
        fi
      else
        printf 'fail\nSetup did not write state file\n' > "$_step_dir/$_step.status"
        exit 1
      fi
    availability:
      restart: "no"

  # Phase 0: Allocate Metro port (no running process needed for builds)
  allocate-metro-port:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: |
      set -e
      # Source React Native lib
      . ${REACT_NATIVE_VIRTENV}/scripts/lib/lib.sh

      # Allocate port for all-platforms test suite
      metro_port=$(rn_allocate_metro_port "all")
      echo "Allocated Metro port: $metro_port"

      # Save environment file for other processes
      env_file=$(rn_save_metro_env "all" "$metro_port")
      echo "Metro environment saved to: $env_file"
    availability:
      restart: "no"

  # Phase 1: Build Node dependencies (shared by both platforms)
  build-node:
    command: |
      set -e
      _step="build-node"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      npm install

      echo "pass" > "$_step_dir/$_step.status"
    availability:
      restart: "no"

  # Phase 2a: Android build (depends on port allocation, NOT metro running)
  build-android:
    command: |
      set -e
      _step="build-android"
      _step_dir="$PWD/reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      # Read SDK root from setup-sdk (process-compose processes have isolated envs)
      if [ -z "${ANDROID_SDK_ROOT:-}" ] && [ -f "${ANDROID_RUNTIME_DIR}/.state/sdk_root" ]; then
        ANDROID_SDK_ROOT="$(cat "${ANDROID_RUNTIME_DIR}/.state/sdk_root")"
        ANDROID_HOME="$ANDROID_SDK_ROOT"
        export ANDROID_SDK_ROOT ANDROID_HOME
      fi

      if [ -z "${ANDROID_SDK_ROOT:-}" ]; then
        echo "ERROR: ANDROID_SDK_ROOT empty after reading state file" >&2
        printf 'fail\nANDROID_SDK_ROOT empty - setup may have failed\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      # Source Metro environment so build knows correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-all.sh
      echo "Metro port for build: $METRO_PORT"

      BUILD_CONFIG="${ANDROID_BUILD_CONFIG:-Debug}"
      echo "Building Android app (${BUILD_CONFIG})..."
      cd android
      ./gradlew assemble${BUILD_CONFIG} -PreactNativeDevServerPort="$METRO_PORT"
      echo 'Build complete'

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      build-node:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 2b: Install CocoaPods (parallel with Android build)
  install-pods:
    command: |
      set -e
      _step="install-pods"
      _step_dir="$PWD/reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      cd ios
      echo "Installing CocoaPods dependencies..."
      pod install --repo-update
      echo 'Pod install complete'

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3a: Sync Android AVDs
  sync-avds:
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 3b: Sync iOS simulators (parallel with Android)
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4a: Launch Android emulator if not running
  launch-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      set -e
      device="${ANDROID_DEFAULT_DEVICE:-max}"

      # Check if emulator already running
      if android.sh emulator ready 2>/dev/null; then
        echo "Emulator already running, skipping launch"
        exit 0
      fi

      echo "[ANDROID-EMULATOR] Starting emulator..."
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        # Pure mode: foreground
        echo "Starting fresh Android emulator (pure mode): $device"
        android.sh emulator start --pure "$device"
        tail -f /dev/null
      else
        # Dev mode: start, wait for ready, then detach
        echo "Starting Android emulator: $device"
        unset ANDROID_EMULATOR_FOREGROUND
        android.sh emulator start --wait-ready "$device"
      fi
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 60

  # Phase 4b: Verify Android emulator ready
  verify-emulator-ready:
    command: |
      set -e
      _step="emulator-boot"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      # Wait a moment for launch to start
      sleep 5

      echo "Verifying emulator is ready..."
      max_wait=300
      elapsed=0
      while ! android.sh emulator ready 2>/dev/null; do
        sleep 3
        elapsed=$((elapsed + 3))
        echo "  Waiting for emulator... ${elapsed}s/${max_wait}s"
        if [ $elapsed -ge $max_wait ]; then
          printf 'fail\nTimed out after %ds waiting for emulator to boot\n' "$max_wait" > "$_step_dir/$_step.status"
          exit 1
        fi
      done
      echo "Emulator ready"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 4c: Launch iOS simulator if not running
  launch-simulator:
    command: |
      set -e

      # Check if simulator already running
      if ios.sh simulator ready 2>/dev/null; then
        echo "Simulator already running, skipping launch"
        exit 0
      fi

      echo "Starting iOS simulator..."
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        # Pure mode: foreground
        ios.sh simulator start --pure ${IOS_DEVICE}
        tail -f /dev/null
      else
        # Dev mode: start, wait for ready, then detach
        ios.sh simulator start --wait-ready ${IOS_DEVICE}
      fi
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 36

  # Phase 4d: Verify iOS simulator ready
  verify-simulator-ready:
    command: |
      set -e
      _step="simulator-boot"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      # Wait a moment for launch to start
      sleep 3

      echo "Verifying simulator is ready..."
      max_wait=180
      elapsed=0
      while ! ios.sh simulator ready 2>/dev/null; do
        sleep 2
        elapsed=$((elapsed + 2))
        echo "  Waiting for simulator... ${elapsed}s/${max_wait}s"
        if [ $elapsed -ge $max_wait ]; then
          printf 'fail\nTimed out after %ds waiting for simulator to boot\n' "$max_wait" > "$_step_dir/$_step.status"
          exit 1
        fi
      done
      echo "Simulator ready"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 5: Start Metro bundler (shared by both platforms)
  metro-bundler:
    command: "metro.sh start all"
    depends_on:
      build-node:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health all ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 5b: Build iOS app (depends on simulator so runtime is installed)
  build-ios:
    command: |
      set -e
      _step="build-ios"
      _step_dir="$PWD/reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      BUILD_CONFIG="${IOS_BUILD_CONFIG:-Debug}"
      echo "Building React Native app (${BUILD_CONFIG})"

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-all.sh
      echo "Metro port: $METRO_PORT"

      # Set up DerivedData path
      DERIVED_DATA="${DEVBOX_PROJECT_ROOT:-.}/.devbox/virtenv/ios/DerivedData"
      mkdir -p "$DERIVED_DATA"

      # Build with xcodebuild
      cd ios
      NODE_BINARY="$NODE_BINARY" RCT_METRO_PORT="$METRO_PORT" \
        xcodebuild -workspace ReactNativeExample.xcworkspace \
          -scheme ReactNativeExample \
          -configuration "$BUILD_CONFIG" \
          -destination "generic/platform=iOS Simulator" \
          -derivedDataPath "$DERIVED_DATA" \
          -quiet \
          build

      echo "Build complete"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      install-pods:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
      launch-simulator:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 6a: Deploy Android app
  deploy-android:
    command: |
      set -e
      _step="deploy-android"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-all.sh
      echo "Metro port: $METRO_PORT"

      # Setup ADB reverse port forwarding so app can reach Metro
      # React Native apps connect to localhost:8081 by default, forward to actual Metro port
      serial=""
      state_dir="${ANDROID_RUNTIME_DIR:-.devbox/virtenv}/${SUITE_NAME:-default}"
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi

      echo "Setting up Metro port forwarding: 8081 -> $METRO_PORT (serial: $serial)"

      # Remove any existing reverse on port 8081
      adb -s "$serial" reverse --remove tcp:8081 2>/dev/null || true

      # Set up new reverse
      adb -s "$serial" reverse tcp:8081 tcp:$METRO_PORT

      # Verify reverse is active
      echo "Verifying port forwarding..."
      adb -s "$serial" reverse --list

      # Deploy using android.sh (APK already built by build-android)
      android.sh deploy

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      build-android:
        condition: process_completed_successfully
      verify-emulator-ready:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 6b: Deploy iOS app
  deploy-ios:
    command: |
      set -e
      _step="deploy-ios"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      ios.sh deploy
      echo "App deployed and launched successfully"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      build-ios:
        condition: process_completed_successfully
      verify-simulator-ready:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7a: Verify Android app is running, healthy, and survives soak
  verify-android-running:
    command: |
      set -e
      _step="verify-android"
      _step_dir="reports/steps"
      _logs_dir="reports/logs"
      mkdir -p "$_step_dir" "$_logs_dir"

      echo "Waiting for Android app to start..."

      # Resolve emulator serial for log checking
      serial=""
      state_dir="${ANDROID_RUNTIME_DIR:-.devbox/virtenv}/${SUITE_NAME:-default}"
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi
      echo "  Serial: $serial"

      max_attempts=20
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if android.sh app status; then
          break
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts: App not running yet..."
        sleep 2
      done

      # Initial liveness check
      if ! android.sh app status; then
        echo "FAIL: Android app is not running"
        adb -s "$serial" logcat -d > "$_logs_dir/logcat-android-verify-failure.txt" 2>&1 || true
        adb -s "$serial" logcat -d -s AndroidRuntime:E > "$_logs_dir/logcat-android-crash-fatal.txt" 2>&1 || true
        echo "Logcat saved to: $_logs_dir/logcat-android-verify-failure.txt"
        echo "Crash logs: $_logs_dir/logcat-android-crash-fatal.txt"
        printf 'fail\nAndroid app not found in running processes\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      echo "  App process is running, waiting 5 seconds for startup..."
      sleep 5

      echo "  Checking logs for errors..."

      # Save logcat snapshot to file
      adb -s "$serial" logcat -d > "$_logs_dir/logcat-android-verify.txt" 2>&1 || true

      # Check for Metro connection errors
      metro_patterns="unable.*load.*script|could.*not.*connect.*metro|connection.*refused.*8081|packaged.*correctly.*for.*release"
      if grep -qiE "$metro_patterns" "$_logs_dir/logcat-android-verify.txt" 2>/dev/null; then
        echo "FAIL: App cannot connect to Metro bundler"
        echo "--- Error lines ---"
        grep -iE "unable|load|script|connect|metro|refused|8081|packaged|release|bundle" "$_logs_dir/logcat-android-verify.txt" | tail -30
        echo "---"
        echo "Full logcat: $_logs_dir/logcat-android-verify.txt"
        printf 'fail\nAndroid app cannot connect to Metro bundler\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      # Check for native crash patterns
      crash_patterns="FATAL EXCEPTION|AndroidRuntime.*FATAL|Process.*crash"
      if grep -qiE "$crash_patterns" "$_logs_dir/logcat-android-verify.txt" 2>/dev/null; then
        echo "FAIL: Crash patterns detected in logcat"
        echo "--- Error lines ---"
        grep -iE "$crash_patterns" "$_logs_dir/logcat-android-verify.txt" | tail -20
        echo "---"
        echo "Full logcat: $_logs_dir/logcat-android-verify.txt"
        printf 'fail\nCrash patterns detected in Android logcat\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      # Check for React Native JS errors
      rn_patterns="ReactNativeJS.*Error|Unhandled JS Exception|RedBoxError"
      if grep -qiE "$rn_patterns" "$_logs_dir/logcat-android-verify.txt" 2>/dev/null; then
        echo "FAIL: React Native JS error detected"
        echo "--- Error lines ---"
        grep -iE "$rn_patterns" "$_logs_dir/logcat-android-verify.txt" | tail -20
        echo "---"
        echo "Full logcat: $_logs_dir/logcat-android-verify.txt"
        printf 'fail\nReact Native JS error detected on Android\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      # Soak period — verify app survives for 10 seconds
      echo "Android app confirmed, starting soak period (10s)..."
      sleep 10

      if ! android.sh app status; then
        echo "FAIL: Android app crashed during soak period"
        adb -s "$serial" logcat -d > "$_logs_dir/logcat-android-soak-crash.txt" 2>&1 || true
        echo "Logcat saved to: $_logs_dir/logcat-android-soak-crash.txt"
        printf 'fail\nAndroid app crashed during soak period\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      echo "Android app verified healthy (process alive, no crashes detected)"
      echo "Logcat saved to: $_logs_dir/logcat-android-verify.txt"
      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      deploy-android:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 7b: Verify iOS app is running, healthy, and survives soak (parallel with Android)
  verify-ios-running:
    command: |
      set -e
      _step="verify-ios"
      _step_dir="reports/steps"
      _logs_dir="reports/logs"
      mkdir -p "$_step_dir" "$_logs_dir"

      UDID=$(cat "${IOS_RUNTIME_DIR:-/tmp}/rn-all-e2e/simulator-udid.txt" 2>/dev/null || cat "${IOS_RUNTIME_DIR:-/tmp}/${SUITE_NAME:-rn-all-e2e}/simulator-udid.txt" 2>/dev/null || true)

      echo "Waiting for iOS app to start..."
      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if ios.sh app status; then
          break
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts: App not running yet..."
        sleep 2
      done

      # Initial liveness check
      if ! ios.sh app status; then
        echo "FAIL: iOS app is not running"
        if [ -n "$UDID" ]; then
          xcrun simctl spawn "$UDID" log show --predicate 'eventMessage contains "crash" OR eventMessage contains "fatal" OR eventMessage contains "terminate"' --last 5m --style compact > "$_logs_dir/simulator-crash.log" 2>&1 || true
          echo "Simulator crash logs: $_logs_dir/simulator-crash.log"
        fi
        printf 'fail\niOS app not found in running processes\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      # Soak period — verify app survives for 10 seconds
      echo "iOS app process is running, starting soak period (10s)..."
      sleep 10

      if ! ios.sh app status; then
        echo "FAIL: iOS app crashed during soak period"
        if [ -n "$UDID" ]; then
          xcrun simctl spawn "$UDID" log show --predicate 'eventMessage contains "crash" OR eventMessage contains "fatal" OR eventMessage contains "terminate"' --last 5m --style compact > "$_logs_dir/simulator-crash.log" 2>&1 || true
          echo "Simulator crash logs: $_logs_dir/simulator-crash.log"
        fi
        printf 'fail\niOS app crashed during soak period\n' > "$_step_dir/$_step.status"
        exit 1
      fi

      # Capture simulator logs for analysis
      if [ -n "$UDID" ]; then
        xcrun simctl spawn "$UDID" log show --last 2m --style compact > "$_logs_dir/simulator-app.log" 2>&1 || true

        # Scan for native crash patterns
        error_patterns="Terminating app|SIGABRT|EXC_BAD_ACCESS|EXC_CRASH|Fatal error|Assertion failure"
        if grep -qiE "$error_patterns" "$_logs_dir/simulator-app.log" 2>/dev/null; then
          echo ""
          echo "FAIL: Crash/error patterns detected in simulator logs"
          echo "--- Error lines ---"
          grep -iE "$error_patterns" "$_logs_dir/simulator-app.log" | head -20
          echo "---"
          echo "Full logs: $_logs_dir/simulator-app.log"
          printf 'fail\nCrash patterns detected in iOS simulator logs\n' > "$_step_dir/$_step.status"
          exit 1
        fi

        # Scan for React Native specific errors
        rn_error_patterns="RCTFatal|Unhandled JS Exception|Unable to load script|Could not connect to development server|RedBoxError"
        if grep -qiE "$rn_error_patterns" "$_logs_dir/simulator-app.log" 2>/dev/null; then
          echo ""
          echo "FAIL: React Native error detected in simulator logs"
          echo "--- Error lines ---"
          grep -iE "$rn_error_patterns" "$_logs_dir/simulator-app.log" | head -20
          echo "---"
          echo "Full logs: $_logs_dir/simulator-app.log"
          printf 'fail\nReact Native error detected in iOS simulator logs\n' > "$_step_dir/$_step.status"
          exit 1
        fi
      fi

      echo "iOS app verified healthy (process alive, no crashes detected)"
      [ -f "$_logs_dir/simulator-app.log" ] && echo "App logs: $_logs_dir/simulator-app.log"
      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      deploy-ios:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - capture final logs, then stop everything in pure mode
  cleanup:
    command: |
      _logs_dir="reports/logs"
      mkdir -p "$_logs_dir"

      # Capture final Android logcat before teardown
      serial=""
      state_dir="${ANDROID_RUNTIME_DIR:-.devbox/virtenv}/${SUITE_NAME:-default}"
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi
      adb -s "$serial" logcat -d > "$_logs_dir/logcat-android-cleanup.txt" 2>&1 || true
      echo "Final Android logcat: $_logs_dir/logcat-android-cleanup.txt"

      # Capture final iOS simulator logs before teardown
      UDID=$(cat "${IOS_RUNTIME_DIR:-/tmp}/rn-all-e2e/simulator-udid.txt" 2>/dev/null || cat "${IOS_RUNTIME_DIR:-/tmp}/${SUITE_NAME:-rn-all-e2e}/simulator-udid.txt" 2>/dev/null || true)
      if [ -n "$UDID" ]; then
        xcrun simctl spawn "$UDID" log show --last 5m --style compact > "$_logs_dir/simulator-final.log" 2>&1 || true
        echo "Final iOS simulator logs: $_logs_dir/simulator-final.log"
      fi

      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop all || true

        # Cleanup Android
        android.sh app stop || true
        android.sh emulator stop || true

        # Cleanup iOS
        ios.sh app stop || true
        ios.sh simulator stop || true

        echo "Metro, apps, and emulator/simulator stopped"
      else
        echo "Test complete - Metro, apps, and emulator/simulator still running for iteration"
      fi
    depends_on:
      verify-android-running:
        condition: process_completed
      verify-ios-running:
        condition: process_completed
      build-node:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - reports per-step pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native All Platforms E2E Test Suite"
      e2e_report_steps setup-sdk build-node build-android install-pods build-ios emulator-boot simulator-boot deploy-android deploy-ios verify-android verify-ios || true
      test_summary "rn-all-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
