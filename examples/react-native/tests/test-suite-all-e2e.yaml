version: "0.5"

environment:
  - "SUITE_NAME=rn-all-e2e"
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "TEST_TUI=${TEST_TUI:-false}"

log_location: "reports/react-native-all-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 1: Build Node dependencies (shared by both platforms)
  build-node:
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2a: Android build
  build-android:
    command: |
      set -e
      BUILD_CONFIG="${ANDROID_BUILD_CONFIG:-Debug}"
      echo "Building Android app (${BUILD_CONFIG})..."
      android.sh build --config "$BUILD_CONFIG"
      echo 'Build complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 2b: Install CocoaPods (parallel with Android build)
  install-pods:
    command: |
      set -e
      cd ios
      echo "Installing CocoaPods dependencies..."
      pod install --repo-update
      echo 'Pod install complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3a: Sync Android AVDs
  sync-avds:
    command: "android.sh devices sync"
    availability:
      restart: "no"

  # Phase 3b: Sync iOS simulators (parallel with Android)
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4a: Start Android emulator
  android-emulator:
    depends_on:
      sync-avds:
        condition: process_completed_successfully
    environment:
      - "ANDROID_EMULATOR_FOREGROUND=1"
    command: |
      set -e
      echo "[ANDROID-EMULATOR] Starting emulator..."
      device="${ANDROID_DEFAULT_DEVICE:-max}"

      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Starting fresh Android emulator (pure mode): $device"
        android.sh emulator start --pure "$device"
      else
        echo "Starting Android emulator: $device"
        unset ANDROID_EMULATOR_FOREGROUND
        android.sh emulator start "$device"
      fi
      # Keep process alive for readiness probe (process-compose services pattern)
      tail -f /dev/null
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "android.sh emulator ready"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 24

  # Phase 4b: Start iOS simulator (parallel with Android)
  ios-simulator:
    command: |
      set -e
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        ios.sh simulator start --pure ${IOS_DEVICE}
      else
        ios.sh simulator start ${IOS_DEVICE}
      fi
      # Keep process alive for readiness probe (process-compose services pattern)
      tail -f /dev/null
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 12

  # Phase 5: Start Metro bundler (shared by both platforms)
  metro-bundler:
    command: "metro.sh start all"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health all ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 6a: Deploy Android app
  deploy-android:
    command: |
      set -e
      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-all.sh
      echo "Metro port: $METRO_PORT"

      # Deploy using android.sh (APK already built by build-android)
      android.sh deploy
    depends_on:
      build-android:
        condition: process_completed_successfully
      android-emulator:
        condition: process_healthy
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 6b: Build and deploy iOS app
  deploy-ios:
    command: |
      set -e

      BUILD_CONFIG="${IOS_BUILD_CONFIG:-Release}"
      echo "Building React Native app (${BUILD_CONFIG})"

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-all.sh
      echo "Metro port: $METRO_PORT"

      # Build with ios.sh build
      NODE_BINARY="$NODE_BINARY" RCT_METRO_PORT="$METRO_PORT" \
        ios.sh build --config "$BUILD_CONFIG" --quiet

      # Deploy to simulator
      ios.sh deploy

      echo "App deployed and launched successfully"
    depends_on:
      install-pods:
        condition: process_completed_successfully
      ios-simulator:
        condition: process_healthy
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7a: Verify Android app and Metro connection
  verify-android-running:
    command: |
      state_dir="${ANDROID_STATE_DIR:-${ANDROID_USER_HOME:-${HOME}/.local/share/android}}"
      app_id=""
      if [ -f "$state_dir/app-id.txt" ]; then
        app_id="$(cat "$state_dir/app-id.txt")"
      fi
      if [ -z "$app_id" ]; then
        echo "ERROR: No app ID found" >&2
        exit 1
      fi

      serial=""
      if [ -f "$state_dir/emulator-serial.txt" ]; then
        serial="$(cat "$state_dir/emulator-serial.txt")"
      fi
      if [ -z "$serial" ]; then
        serial="emulator-${EMU_PORT:-5554}"
      fi

      echo "Waiting for Android app to start and connect to Metro..."
      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if ! android.sh app status; then
          attempt=$((attempt + 1))
          echo "  Attempt $attempt/$max_attempts: App not running yet..."
          sleep 2
          continue
        fi

        echo "  App process is running, checking Metro connection..."
        log_output=$(adb -s "$serial" logcat -d -s ReactNativeJS:* ReactNative:* -t 50 2>/dev/null || true)

        if echo "$log_output" | grep -qi "fatal\|exception\|error.*metro\|failed.*connect"; then
          echo "ERROR: Android app encountered errors:" >&2
          echo "$log_output" | grep -i "fatal\|exception\|error\|failed" | tail -10 >&2
          exit 1
        fi

        if echo "$log_output" | grep -qi "running.*application\|bundle.*loaded"; then
          echo "✓ Android app is running and connected to Metro"
          mkdir -p reports
          touch reports/.e2e-android-passed
          exit 0
        fi

        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts: Waiting for Metro connection..."
        sleep 2
      done

      echo "ERROR: Android app started but did not connect to Metro" >&2
      adb -s "$serial" logcat -d -s ReactNativeJS:* ReactNative:* -t 20 >&2
      exit 1
    depends_on:
      deploy-android:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 7b: Verify iOS app and Metro connection (parallel with Android)
  verify-ios-running:
    command: |
      state_dir="${IOS_STATE_DIR:-${HOME}/.local/share/ios}"
      bundle_id=""
      if [ -f "$state_dir/bundle-id.txt" ]; then
        bundle_id="$(cat "$state_dir/bundle-id.txt")"
      fi
      if [ -z "$bundle_id" ]; then
        echo "ERROR: No bundle ID found" >&2
        exit 1
      fi

      udid=""
      if [ -f "$state_dir/simulator-udid.txt" ]; then
        udid="$(cat "$state_dir/simulator-udid.txt")"
      fi
      if [ -z "$udid" ]; then
        udid="$(xcrun simctl list devices -j | jq -r '.devices[]?[]? | select(.state == "Booted") | .udid' | head -n1 || true)"
      fi
      if [ -z "$udid" ]; then
        echo "ERROR: No booted simulator found" >&2
        exit 1
      fi

      echo "Waiting for iOS app to start and connect to Metro..."
      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if ! ios.sh app status; then
          attempt=$((attempt + 1))
          echo "  Attempt $attempt/$max_attempts: App not running yet..."
          sleep 2
          continue
        fi

        echo "  App process is running, checking Metro connection..."
        log_output=$(xcrun simctl spawn "$udid" log show --predicate 'processImagePath contains "ReactNativeExample"' --last 30s --style compact 2>/dev/null || true)

        if echo "$log_output" | grep -qi "fatal\|crashed\|exception.*metro\|failed.*connect.*metro"; then
          echo "ERROR: iOS app encountered errors:" >&2
          echo "$log_output" | grep -i "fatal\|crashed\|exception\|failed" | tail -10 >&2
          exit 1
        fi

        if pgrep -f "react-native start.*8091" >/dev/null 2>&1; then
          echo "✓ iOS app is running and Metro is serving"
          mkdir -p reports
          touch reports/.e2e-ios-passed
          exit 0
        fi

        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts: Waiting for Metro connection..."
        sleep 2
      done

      echo "ERROR: iOS app started but did not connect to Metro" >&2
      xcrun simctl spawn "$udid" log show --predicate 'processImagePath contains "ReactNativeExample"' --last 10s --style compact >&2
      exit 1
    depends_on:
      deploy-ios:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Mark passed - only runs when both platforms verified successfully
  mark-passed:
    command: |
      mkdir -p reports
      touch reports/.e2e-passed
      echo "All platforms verified successfully"
    depends_on:
      verify-android-running:
        condition: process_completed_successfully
      verify-ios-running:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - runs when both platforms complete
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop all || true

        # Cleanup Android
        android.sh app stop || true
        android.sh emulator stop || true

        # Cleanup iOS
        ios.sh app stop || true
        ios.sh simulator stop || true

        echo "Metro, apps, and emulator/simulator stopped"
      else
        echo "Test complete - Metro, apps, and emulator/simulator still running for iteration"
      fi
    depends_on:
      mark-passed:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - always runs, checks marker file for pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native All Platforms E2E Test Suite"
      assert_file_exists "reports/.e2e-passed" "E2E pipeline completed"
      rm -f reports/.e2e-passed
      test_summary "rn-all-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
