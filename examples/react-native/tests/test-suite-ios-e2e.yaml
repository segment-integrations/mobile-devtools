version: "0.5"

environment:
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "SUITE_NAME=rn-ios-e2e"
  - "IOS_BUILD_CONFIG=Debug"
  - "ANDROID_SKIP_SETUP=1"
  - "TEST_TUI=${TEST_TUI:-false}"
  - "REACT_NATIVE_VIRTENV=${REACT_NATIVE_VIRTENV}"

log_location: "reports/react-native-ios-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 1: Build Node dependencies
  build-node:
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2: Install CocoaPods dependencies
  install-pods:
    command: |
      set -e
      cd ios
      echo "Installing CocoaPods dependencies..."
      pod install --repo-update
      echo 'Pod install complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync simulators
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4a: Launch simulator if not running
  launch-simulator:
    command: |
      set -e

      # Check if simulator already running
      if ios.sh simulator ready 2>/dev/null; then
        echo "Simulator already running, skipping launch"
        exit 0
      fi

      echo "Starting iOS simulator..."
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        # Pure mode: foreground, process-compose manages lifecycle
        ios.sh simulator start --pure ${IOS_DEVICE}
        tail -f /dev/null  # Keep alive
      else
        # Dev mode: start simulator, wait for ready, then detach
        ios.sh simulator start --wait-ready ${IOS_DEVICE}
      fi
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 12

  # Phase 4b: Verify simulator ready
  verify-simulator-ready:
    command: |
      echo "Verifying simulator is ready..."
      max_wait=60
      elapsed=0
      while ! ios.sh simulator ready 2>/dev/null; do
        sleep 2
        elapsed=$((elapsed + 2))
        if [ $elapsed -ge $max_wait ]; then
          echo "ERROR: Simulator not ready within ${max_wait}s" >&2
          exit 1
        fi
      done
      echo "✓ Simulator ready"
    depends_on:
      launch-simulator:
        condition: process_completed
    availability:
      restart: "no"

  # Phase 5: Start Metro bundler
  metro-bundler:
    command: "metro.sh start ios"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health ios ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 6a: Build iOS app
  build-ios:
    command: |
      set -e

      BUILD_CONFIG="${IOS_BUILD_CONFIG:-Release}"
      echo "Building React Native app (${BUILD_CONFIG})"

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-ios.sh
      echo "Metro port: $METRO_PORT"

      # Build with ios.sh build
      NODE_BINARY="$NODE_BINARY" RCT_METRO_PORT="$METRO_PORT" \
        ios.sh build --config "$BUILD_CONFIG" --quiet

      echo "Build complete"
    depends_on:
      install-pods:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 6b: Deploy iOS app
  deploy-ios:
    command: |
      set -e
      ios.sh deploy
      echo "App deployed and launched successfully"
    depends_on:
      build-ios:
        condition: process_completed_successfully
      verify-simulator-ready:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7: Verify app is running
  verify-app-running:
    command: |
      echo "Waiting for app to start..."

      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        # Check if app process is running using built-in command
        if ! ios.sh app status; then
          attempt=$((attempt + 1))
          echo "  Attempt $attempt/$max_attempts: App not running yet..."
          sleep 2
          continue
        fi

        # Success: app is running
        echo "✓ App is running"
        mkdir -p reports
        touch reports/.e2e-passed
        exit 0
      done

      echo "ERROR: App did not start within timeout" >&2
      exit 1
    depends_on:
      deploy-ios:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - runs after verify completes
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop ios || true
        ios.sh app stop || true
        ios.sh simulator stop
        echo "Metro, app, and test simulator stopped"
      else
        echo "Test complete - Metro, app, and simulator still running for iteration"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - always runs, checks marker file for pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native iOS E2E Test Suite"
      assert_file_exists "reports/.e2e-passed" "E2E pipeline completed"
      rm -f reports/.e2e-passed
      test_summary "rn-ios-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
