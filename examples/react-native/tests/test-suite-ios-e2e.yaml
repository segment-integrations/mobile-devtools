version: "0.5"

environment:
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "SUITE_NAME=rn-ios-e2e"
  - "ANDROID_SKIP_SETUP=1"
  - "TEST_TUI=${TEST_TUI:-false}"
  - "REACT_NATIVE_VIRTENV=${REACT_NATIVE_VIRTENV}"

log_location: "reports/react-native-ios-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase 1: Build Node dependencies
  build-node:
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2: Install CocoaPods dependencies
  install-pods:
    command: |
      set -e
      cd ios
      echo "Installing CocoaPods dependencies..."
      pod install --repo-update
      echo 'Pod install complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync simulators
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4: Start simulator
  ios-simulator:
    command: |
      set -e
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        ios.sh simulator start --pure ${IOS_DEVICE}
      else
        ios.sh simulator start ${IOS_DEVICE}
      fi
      # Keep process alive for readiness probe (process-compose services pattern)
      tail -f /dev/null
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 12

  # Phase 5: Start Metro bundler
  metro-bundler:
    command: "metro.sh start ios"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health ios ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 6: Build and deploy app
  deploy-ios:
    command: |
      set -e

      BUILD_CONFIG="${IOS_BUILD_CONFIG:-Release}"
      echo "Building React Native app (${BUILD_CONFIG})"

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-ios.sh
      echo "Metro port: $METRO_PORT"

      # Build with ios.sh build
      NODE_BINARY="$NODE_BINARY" RCT_METRO_PORT="$METRO_PORT" \
        ios.sh build --config "$BUILD_CONFIG" --quiet

      # Deploy to simulator
      ios.sh deploy

      echo "App deployed and launched successfully"
    depends_on:
      install-pods:
        condition: process_completed_successfully
      ios-simulator:
        condition: process_healthy
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7: Verify app is running and connected to Metro
  verify-app-running:
    command: |
      # Get bundle ID and simulator UDID
      state_dir="${IOS_STATE_DIR:-${HOME}/.local/share/ios}"
      bundle_id=""
      if [ -f "$state_dir/bundle-id.txt" ]; then
        bundle_id="$(cat "$state_dir/bundle-id.txt")"
      fi
      if [ -z "$bundle_id" ]; then
        echo "ERROR: No bundle ID found" >&2
        exit 1
      fi

      udid=""
      if [ -f "$state_dir/simulator-udid.txt" ]; then
        udid="$(cat "$state_dir/simulator-udid.txt")"
      fi
      if [ -z "$udid" ]; then
        udid="$(xcrun simctl list devices -j | jq -r '.devices[]?[]? | select(.state == "Booted") | .udid' | head -n1 || true)"
      fi
      if [ -z "$udid" ]; then
        echo "ERROR: No booted simulator found" >&2
        exit 1
      fi

      echo "Waiting for app to start and connect to Metro..."
      echo "  Bundle ID: $bundle_id"
      echo "  Simulator: $udid"

      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        # Check if app process is running
        if ! ios.sh app status; then
          attempt=$((attempt + 1))
          echo "  Attempt $attempt/$max_attempts: App not running yet..."
          sleep 2
          continue
        fi

        echo "  App process is running, checking Metro connection..."

        # Check simulator logs for Metro connection and errors
        log_output=$(xcrun simctl spawn "$udid" log show --predicate 'processImagePath contains "ReactNativeExample"' --last 30s --style compact 2>/dev/null || true)

        # Check for fatal errors or crashes
        if echo "$log_output" | grep -qi "fatal\|crashed\|exception.*metro\|failed.*connect.*metro"; then
          echo "ERROR: App encountered errors:" >&2
          echo "$log_output" | grep -i "fatal\|crashed\|exception\|failed" | tail -10 >&2
          exit 1
        fi

        # For Metro connection, check if bundle was loaded (React Native logs this)
        # Also check if Metro served the bundle (look at Metro process)
        if pgrep -f "react-native start.*8091" >/dev/null 2>&1; then
          echo "✓ App is running and Metro is serving"
          mkdir -p reports
          touch reports/.e2e-passed
          exit 0
        fi

        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts: Waiting for Metro connection..."
        sleep 2
      done

      echo "ERROR: App started but did not connect to Metro within timeout" >&2
      echo "Recent logs:" >&2
      xcrun simctl spawn "$udid" log show --predicate 'processImagePath contains "ReactNativeExample"' --last 10s --style compact >&2
      exit 1
    depends_on:
      deploy-ios:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - runs after verify completes
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop ios || true
        ios.sh app stop || true
        ios.sh simulator stop
        echo "Metro, app, and test simulator stopped"
      else
        echo "Test complete - Metro, app, and simulator still running for iteration"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - always runs, checks marker file for pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native iOS E2E Test Suite"
      assert_file_exists "reports/.e2e-passed" "E2E pipeline completed"
      rm -f reports/.e2e-passed
      test_summary "rn-ios-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
