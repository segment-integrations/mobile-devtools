version: "0.5"

environment:
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "SUITE_NAME=rn-ios-e2e"
  - "IOS_BUILD_CONFIG=Debug"
  - "ANDROID_SKIP_SETUP=1"
  - "TEST_TUI=${TEST_TUI:-false}"
  - "REACT_NATIVE_VIRTENV=${REACT_NATIVE_VIRTENV}"

log_location: "reports/react-native-ios-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase -1: Setup - ensure environment is ready
  setup-sdk:
    command: "setup"
    availability:
      restart: "no"

  # Phase 0: Allocate Metro port (no running process needed for builds)
  allocate-metro-port:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: |
      set -e
      # Source React Native lib
      . ${REACT_NATIVE_VIRTENV}/scripts/lib/lib.sh

      # Allocate port for ios test suite
      metro_port=$(rn_allocate_metro_port "ios")
      echo "Allocated Metro port: $metro_port"

      # Save environment file for other processes
      env_file=$(rn_save_metro_env "ios" "$metro_port")
      echo "Metro environment saved to: $env_file"
    availability:
      restart: "no"

  # Phase 1: Build Node dependencies
  build-node:
    command: |
      set -e
      _step="build-node"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      npm install

      echo "pass" > "$_step_dir/$_step.status"
    availability:
      restart: "no"

  # Phase 2: Install CocoaPods dependencies
  install-pods:
    command: |
      set -e
      _step="install-pods"
      _step_dir="$PWD/reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      cd ios
      echo "Installing CocoaPods dependencies..."
      pod install --repo-update
      echo 'Pod install complete'

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync simulators
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4a: Launch simulator if not running
  launch-simulator:
    command: |
      set -e

      # Check if simulator already running
      if ios.sh simulator ready 2>/dev/null; then
        echo "Simulator already running, skipping launch"
        exit 0
      fi

      echo "Starting iOS simulator..."
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        # Pure mode: foreground, process-compose manages lifecycle
        ios.sh simulator start --pure ${IOS_DEVICE}
        tail -f /dev/null  # Keep alive
      else
        # Dev mode: start simulator, wait for ready, then detach
        ios.sh simulator start --wait-ready ${IOS_DEVICE}
      fi
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 36

  # Phase 4b: Verify simulator ready
  verify-simulator-ready:
    command: |
      _step="simulator-boot"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      # Wait a moment for launch to start
      sleep 3

      echo "Verifying simulator is ready..."
      max_wait=180
      elapsed=0
      while ! ios.sh simulator ready 2>/dev/null; do
        sleep 2
        elapsed=$((elapsed + 2))
        echo "  Waiting for simulator... ${elapsed}s/${max_wait}s"
        if [ $elapsed -ge $max_wait ]; then
          printf 'fail\nTimed out after %ds waiting for simulator to boot\n' "$max_wait" > "$_step_dir/$_step.status"
          exit 1
        fi
      done
      echo "Simulator ready"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 5: Start Metro bundler
  metro-bundler:
    command: "metro.sh start ios"
    depends_on:
      build-node:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health ios ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 12

  # Phase 6a: Build iOS app (depends on port allocation, NOT metro running)
  build-ios:
    command: |
      set -e
      _step="build-ios"
      _step_dir="$PWD/reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      BUILD_CONFIG="${IOS_BUILD_CONFIG:-Release}"
      echo "Building React Native app (${BUILD_CONFIG})"

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-ios.sh
      echo "Metro port: $METRO_PORT"

      # Set up DerivedData path
      DERIVED_DATA="${DEVBOX_PROJECT_ROOT:-.}/.devbox/virtenv/ios/DerivedData"
      mkdir -p "$DERIVED_DATA"

      # Build with xcodebuild
      cd ios
      NODE_BINARY="$NODE_BINARY" RCT_METRO_PORT="$METRO_PORT" \
        xcodebuild -workspace ReactNativeExample.xcworkspace \
          -scheme ReactNativeExample \
          -configuration "$BUILD_CONFIG" \
          -destination "generic/platform=iOS Simulator" \
          -derivedDataPath "$DERIVED_DATA" \
          -quiet \
          build

      echo "Build complete"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      install-pods:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 6b: Deploy iOS app
  deploy-ios:
    command: |
      set -e
      _step="deploy"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"
      trap 'printf "fail\nExited with error (exit code $?)\n" > "$_step_dir/$_step.status"' ERR

      ios.sh deploy
      echo "App deployed and launched successfully"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      build-ios:
        condition: process_completed_successfully
      verify-simulator-ready:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7: Verify app is running
  verify-app-running:
    command: |
      _step="verify-app"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      echo "Waiting for app to start..."

      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        # Check if app process is running using built-in command
        if ! ios.sh app status; then
          attempt=$((attempt + 1))
          echo "  Attempt $attempt/$max_attempts: App not running yet..."
          sleep 2
          continue
        fi

        # Success: app is running
        echo "App is running"
        echo "pass" > "$_step_dir/$_step.status"
        exit 0
      done

      printf 'fail\nApp did not start within timeout\n' > "$_step_dir/$_step.status"
      exit 1
    depends_on:
      deploy-ios:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - runs after verify completes
  cleanup:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop ios || true
        ios.sh app stop || true
        ios.sh simulator stop
        echo "Metro, app, and test simulator stopped"
      else
        echo "Test complete - Metro, app, and simulator still running for iteration"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - reports per-step pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native iOS E2E Test Suite"
      e2e_report_steps || true
      test_summary "rn-ios-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
