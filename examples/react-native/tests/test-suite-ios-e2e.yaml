version: "0.5"

environment:
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "SUITE_NAME=rn-ios-e2e"
  - "IOS_BUILD_CONFIG=Debug"
  - "ANDROID_SKIP_SETUP=1"
  - "TEST_TUI=${TEST_TUI:-false}"
  - "REACT_NATIVE_VIRTENV=${REACT_NATIVE_VIRTENV}"

log_location: "reports/react-native-ios-e2e-logs"
log_level: info
is_strict: true

processes:
  # Phase -1: Setup - ensure iOS environment is ready
  setup-sdk:
    command: |
      set -e
      _step="setup-sdk"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      if [ -n "${IOS_SCRIPTS_DIR:-}" ] && [ -f "${IOS_SCRIPTS_DIR}/user/setup.sh" ]; then
        bash "${IOS_SCRIPTS_DIR}/user/setup.sh"
      elif [ -n "${IOS_SCRIPTS_DIR:-}" ] && [ -f "${IOS_SCRIPTS_DIR}/init/setup.sh" ]; then
        if ! . "${IOS_SCRIPTS_DIR}/init/setup.sh"; then
          echo "❌ [ERROR] iOS setup failed" >&2
          printf 'fail\niOS init/setup.sh failed\n' > "$_step_dir/$_step.status"
          exit 1
        fi
      fi
      echo "pass" > "$_step_dir/$_step.status"
    availability:
      restart: "no"

  # Phase 0: Allocate Metro port (no running process needed for builds)
  allocate-metro-port:
    depends_on:
      setup-sdk:
        condition: process_completed_successfully
    command: |
      set -e
      # Source React Native lib
      . ${REACT_NATIVE_VIRTENV}/scripts/lib/lib.sh

      # Allocate port for ios test suite
      metro_port=$(rn_allocate_metro_port "ios")
      echo "Allocated Metro port: $metro_port"

      # Save environment file for other processes
      env_file=$(rn_save_metro_env "ios" "$metro_port")
      echo "Metro environment saved to: $env_file"
    availability:
      restart: "no"

  # Phase 1: Build Node dependencies
  build-node:
    command: |
      set -e
      _step="build-node"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      # Source test framework for timing functions
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"

      # Record start time
      e2e_step_start "$_step"

      # Trap errors and record failure with timing
      trap 'e2e_step_end "$_step" "fail" "Exited with error (exit code $?)"' ERR

      npm install

      # Record success with timing
      e2e_step_end "$_step" "pass"
    availability:
      restart: "no"

  # Phase 2: Install CocoaPods dependencies
  install-pods:
    command: |
      set -e
      _step="install-pods"

      # Source test framework for timing functions
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"

      # Record start time
      e2e_step_start "$_step"

      # Trap errors and record failure with timing
      trap 'e2e_step_end "$_step" "fail" "Exited with error (exit code $?)"' ERR

      cd ios
      echo "Installing CocoaPods dependencies..."
      pod install --repo-update
      echo 'Pod install complete'

      # Record success with timing
      e2e_step_end "$_step" "pass"
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync simulators
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4a: Launch simulator if not running
  launch-simulator:
    command: |
      set -e

      # Check if simulator already running
      if ios.sh simulator ready 2>/dev/null; then
        echo "Simulator already running, skipping launch"
        exit 0
      fi

      echo "Starting iOS simulator..."
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        # Pure mode: foreground, process-compose manages lifecycle
        ios.sh simulator start --pure ${IOS_DEVICE}
        tail -f /dev/null  # Keep alive
      else
        # Dev mode: start simulator, wait for ready, then detach
        ios.sh simulator start --wait-ready ${IOS_DEVICE}
      fi
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "ios.sh simulator ready"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 36

  # Phase 4b: Verify simulator ready
  verify-simulator-ready:
    command: |
      set -e
      _step="simulator-boot"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      # Wait a moment for launch to start
      sleep 3

      echo "Verifying simulator is ready..."
      max_wait=180
      elapsed=0
      while ! ios.sh simulator ready 2>/dev/null; do
        sleep 2
        elapsed=$((elapsed + 2))
        echo "  Waiting for simulator... ${elapsed}s/${max_wait}s"
        if [ $elapsed -ge $max_wait ]; then
          printf 'fail\nTimed out after %ds waiting for simulator to boot\n' "$max_wait" > "$_step_dir/$_step.status"
          exit 1
        fi
      done
      echo "Simulator ready"

      echo "pass" > "$_step_dir/$_step.status"
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 5: Start Metro bundler
  metro-bundler:
    command: "metro.sh start ios"
    depends_on:
      build-node:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: "metro.sh health ios ios"
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 24
    shutdown:
      signal: 15
      timeout_seconds: 5

  # Phase 6a: Build iOS app (depends on simulator so runtime is installed)
  build-ios:
    command: |
      set -e
      _step="build-ios"

      # Source test framework for timing functions
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"

      # Record start time
      e2e_step_start "$_step"

      # Trap errors and record failure with timing
      trap 'e2e_step_end "$_step" "fail" "Exited with error (exit code $?)"' ERR

      # Source iOS setup (process-compose processes have isolated environments)
      if [ -n "${IOS_SCRIPTS_DIR:-}" ] && [ -f "${IOS_SCRIPTS_DIR}/init/setup.sh" ]; then
        . "${IOS_SCRIPTS_DIR}/init/setup.sh"
      fi

      BUILD_CONFIG="${IOS_BUILD_CONFIG:-Release}"
      echo "Building React Native app (${BUILD_CONFIG})"

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-ios.sh
      echo "Metro port: $METRO_PORT"

      # Set up DerivedData path (use IOS_DERIVED_DATA_PATH from iOS plugin)
      DERIVED_DATA="${IOS_DERIVED_DATA_PATH}"
      mkdir -p "$DERIVED_DATA"
      echo "DerivedData path: $DERIVED_DATA"

      # Build with xcodebuild
      cd ios
      NODE_BINARY="$NODE_BINARY" RCT_METRO_PORT="$METRO_PORT" \
        xcodebuild -workspace ReactNativeExample.xcworkspace \
          -scheme ReactNativeExample \
          -configuration "$BUILD_CONFIG" \
          -destination "generic/platform=iOS Simulator" \
          -derivedDataPath "$DERIVED_DATA" \
          -quiet \
          build

      echo "Build complete"

      # Record success with timing
      e2e_step_end "$_step" "pass"
    depends_on:
      install-pods:
        condition: process_completed_successfully
      allocate-metro-port:
        condition: process_completed_successfully
      launch-simulator:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 6b: Deploy iOS app
  deploy-ios:
    command: |
      set -e
      _step="deploy"
      _step_dir="reports/steps"
      mkdir -p "$_step_dir"

      # Source test framework for timing functions
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"

      # Record start time
      e2e_step_start "$_step"

      # Trap errors and record failure with timing
      trap 'e2e_step_end "$_step" "fail" "Exited with error (exit code $?)"' ERR

      # Verify Metro is healthy before attempting deploy
      if ! metro.sh health ios ios; then
        echo "ERROR: Metro bundler is not healthy, cannot deploy" >&2
        e2e_step_end "$_step" "fail" "Metro bundler not healthy"
        exit 1
      fi

      ios.sh deploy
      echo "App deployed and launched successfully"

      # Record success with timing
      e2e_step_end "$_step" "pass"
    depends_on:
      build-ios:
        condition: process_completed_successfully
      verify-simulator-ready:
        condition: process_completed_successfully
      metro-bundler:
        condition: process_healthy
    availability:
      restart: "no"

  # Phase 7: Verify app is running, healthy, and survives soak period
  verify-app-running:
    command: |
      set -e
      _step="verify-app"
      _step_dir="reports/steps"
      _logs_dir="reports/logs"
      mkdir -p "$_step_dir" "$_logs_dir"

      # Source test framework for timing functions
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"

      # Record start time
      e2e_step_start "$_step"

      # Trap errors and record failure with timing
      trap 'e2e_step_end "$_step" "fail" "Exited with error (exit code $?)"' ERR

      UDID=$(cat "${IOS_RUNTIME_DIR:-/tmp}/rn-ios-e2e/simulator-udid.txt" 2>/dev/null || cat "${IOS_RUNTIME_DIR:-/tmp}/${SUITE_NAME:-rn-ios-e2e}/simulator-udid.txt" 2>/dev/null || true)

      echo "Waiting for app to start..."

      max_attempts=15
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if ios.sh app status; then
          break
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts: App not running yet..."
        sleep 2
      done

      # Initial liveness check
      if ! ios.sh app status; then
        echo "FAIL: App is not running"
        if [ -n "$UDID" ]; then
          xcrun simctl spawn "$UDID" log show --predicate 'eventMessage contains "crash" OR eventMessage contains "fatal" OR eventMessage contains "terminate"' --last 5m --style compact > "$_logs_dir/simulator-crash.log" 2>&1 || true
          echo "Simulator crash logs: $_logs_dir/simulator-crash.log"
        fi
        e2e_step_end "$_step" "fail" "App not found in running processes"
        exit 1
      fi

      # Soak period — verify app survives for 10 seconds
      echo "App process is running, starting soak period (10s)..."
      sleep 10

      if ! ios.sh app status; then
        echo "FAIL: App crashed during soak period"
        if [ -n "$UDID" ]; then
          xcrun simctl spawn "$UDID" log show --predicate 'eventMessage contains "crash" OR eventMessage contains "fatal" OR eventMessage contains "terminate"' --last 5m --style compact > "$_logs_dir/simulator-crash.log" 2>&1 || true
          echo "Simulator crash logs: $_logs_dir/simulator-crash.log"
        fi
        e2e_step_end "$_step" "fail" "App crashed during soak period"
        exit 1
      fi

      # Capture simulator logs for analysis
      if [ -n "$UDID" ]; then
        xcrun simctl spawn "$UDID" log show --last 2m --style compact > "$_logs_dir/simulator-app.log" 2>&1 || true

        # Scan for native crash patterns
        error_patterns="Terminating app|SIGABRT|EXC_BAD_ACCESS|EXC_CRASH|Assertion failure"
        if grep -qiE "$error_patterns" "$_logs_dir/simulator-app.log" 2>/dev/null; then
          echo ""
          echo "FAIL: Crash/error patterns detected in simulator logs"
          echo "--- Error lines ---"
          grep -iE "$error_patterns" "$_logs_dir/simulator-app.log" | head -20
          echo "---"
          echo "Full logs: $_logs_dir/simulator-app.log"
          e2e_step_end "$_step" "fail" "Crash patterns detected in simulator logs"
          exit 1
        fi

        # Scan for React Native specific errors
        rn_error_patterns="RCTFatal|Unhandled JS Exception|Unable to load script|Could not connect to development server|RedBoxError"
        if grep -qiE "$rn_error_patterns" "$_logs_dir/simulator-app.log" 2>/dev/null; then
          echo ""
          echo "FAIL: React Native error detected in simulator logs"
          echo "--- Error lines ---"
          grep -iE "$rn_error_patterns" "$_logs_dir/simulator-app.log" | head -20
          echo "---"
          echo "Full logs: $_logs_dir/simulator-app.log"
          e2e_step_end "$_step" "fail" "React Native error detected in simulator logs"
          exit 1
        fi
      fi

      # Record success with timing
      e2e_step_end "$_step" "pass"
      echo "App verified healthy (process alive, no crashes detected)"
      [ -f "$_logs_dir/simulator-app.log" ] && echo "App logs: $_logs_dir/simulator-app.log"
    depends_on:
      deploy-ios:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - capture final logs, then stop everything in pure mode
  cleanup:
    command: |
      _step_dir="reports/steps"
      _logs_dir="reports/logs"
      mkdir -p "$_logs_dir"

      # Check if app verification succeeded
      app_verify_failed=false
      if [ -f "$_step_dir/verify-app.status" ]; then
        verify_status=$(head -n1 "$_step_dir/verify-app.status")
        if [ "$verify_status" = "fail" ]; then
          app_verify_failed=true
          echo "App verification failed, skipping log capture"
        fi
      fi

      # Only capture logs if verification succeeded
      if [ "$app_verify_failed" = false ]; then
        UDID=$(cat "${IOS_RUNTIME_DIR:-/tmp}/rn-ios-e2e/simulator-udid.txt" 2>/dev/null || cat "${IOS_RUNTIME_DIR:-/tmp}/${SUITE_NAME:-rn-ios-e2e}/simulator-udid.txt" 2>/dev/null || true)
        if [ -n "$UDID" ]; then
          timeout 10s xcrun simctl spawn "$UDID" log show --last 5m --style compact > "$_logs_dir/simulator-final.log" 2>&1 || true
          echo "Final simulator logs: $_logs_dir/simulator-final.log"
        fi
      fi

      # Stop services (only in pure mode)
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "Cleaning up (pure mode)..."
        metro.sh stop ios || true
        ios.sh app stop || true
        ios.sh simulator stop
        echo "Cleanup complete"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
      build-node:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - reports per-step pass/fail
  summary:
    command: |
      set -e
      export REPO_ROOT="$(cd ../.. && pwd)"
      . "$REPO_ROOT/plugins/tests/test-framework.sh"
      log_test "React Native iOS E2E Test Suite"
      e2e_report_steps setup-sdk build-node install-pods simulator-boot build-ios deploy verify-app || true
      test_summary "rn-ios-e2e"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
