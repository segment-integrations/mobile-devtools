version: "0.5"

environment:
  - "IOS_DEVICE=${IOS_DEFAULT_DEVICE:-max}"
  - "TEST_TIMEOUT=300"
  - "BOOT_TIMEOUT=120"
  - "ANDROID_SKIP_SETUP=1"
  - "TEST_TUI=${TEST_TUI:-false}"
  - "LANG=en_US.UTF-8"
  - "LC_ALL=en_US.UTF-8"
  - "REACT_NATIVE_VIRTENV=${REACT_NATIVE_VIRTENV}"

log_location: "reports/react-native-ios-e2e-logs"
log_level: info
is_strict: true
exit_on_end: true

processes:
  # Phase 0: Allocate Metro port (runs first, no dependencies)
  allocate-metro-port:
    command: |
      # Source React Native lib
      . ${REACT_NATIVE_VIRTENV}/scripts/lib/lib.sh

      # Allocate port for ios test suite
      metro_port=$(rn_allocate_metro_port "ios")
      echo "📡 Allocated Metro port: $metro_port"

      # Save environment file for other processes
      env_file=$(rn_save_metro_env "ios" "$metro_port")
      echo "✓ Metro environment saved to: $env_file"
    availability:
      restart: "no"

  # Phase 1: Build Node dependencies
  build-node:
    depends_on:
      allocate-metro-port:
        condition: process_completed_successfully
    command: "npm install"
    availability:
      restart: "no"

  # Phase 2: Install CocoaPods dependencies
  install-pods:
    command: |
      cd ios
      echo "Installing CocoaPods dependencies..."
      # Strip Nix compiler env vars so CocoaPods uses system compilers
      # (Nix CC can't find iOS SDK for cross-compilation)
      unset CC CXX LD LDFLAGS NIX_CC NIX_CXX NIX_LDFLAGS NIX_CFLAGS_COMPILE NIX_CFLAGS_LINK
      unset NIX_ENFORCE_PURITY NIX_HARDENING_ENABLE
      unset AR NM RANLIB STRIP SDKROOT
      export CC=/usr/bin/clang CXX=/usr/bin/clang++
      pod install --repo-update
      echo '✓ Pod install complete'
    depends_on:
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 3: Sync simulators
  sync-simulators:
    command: "ios.sh devices sync"
    availability:
      restart: "no"

  # Phase 4: Start simulator
  ios-simulator:
    command: |
      mkdir -p .devbox/virtenv/ios/runtime

      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "🚀 Starting fresh iOS simulator with clean state (${IOS_DEVICE})..."
        output=$(ios.sh simulator start --pure ${IOS_DEVICE} 2>&1)
        echo "$output"

        test_udid=$(echo "$output" | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' | tail -1)
        if [ -n "$test_udid" ]; then
          echo "$test_udid" > .devbox/virtenv/ios/runtime/simulator-udid.txt
          echo "✓ Test simulator UDID saved: $test_udid"
        fi

        echo "✓ Test simulator ready for testing"
        exit 0
      else
        echo "🚀 Starting iOS simulator (${IOS_DEVICE})..."
        ios.sh simulator start ${IOS_DEVICE}

        echo "Waiting for simulator to boot..."
        DEVICE_UDID=$(xcrun simctl list devices | grep "Booted" | grep -oE '[0-9A-F-]{36}' | head -1 || echo "")
        if [ -z "$DEVICE_UDID" ]; then
          echo "ERROR: No booted simulator found"
          exit 1
        fi
        xcrun simctl bootstatus "$DEVICE_UDID" >/dev/null 2>&1 || true

        echo "✓ Simulator ready for testing"
        echo "✓ Simulator will remain running after tests complete"
        exit 0
      fi
    depends_on:
      sync-simulators:
        condition: process_completed_successfully
    availability:
      restart: "no"
    readiness_probe:
      exec:
        command: |
          if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
            DEVICE_UDID=$(xcrun simctl list devices | grep "Test" | grep "Booted" | grep -oE '[0-9A-F-]{36}' | head -1 || echo "")
          else
            DEVICE_UDID=$(xcrun simctl list devices | grep "Booted" | grep -oE '[0-9A-F-]{36}' | head -1 || echo "")
          fi
          [ -n "$DEVICE_UDID" ] && xcrun simctl bootstatus "$DEVICE_UDID" >/dev/null 2>&1
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 120
      success_threshold: 1
      failure_threshold: 3

  # Phase 5: Start Metro bundler
  metro-bundler:
    command: "metro.sh start ios"
    depends_on:
      allocate-metro-port:
        condition: process_completed_successfully
      build-node:
        condition: process_completed_successfully
    availability:
      restart: "no"
    shutdown:
      command: "metro.sh stop ios || true"
      signal: 15
      timeout_seconds: 5
    readiness_probe:
      exec:
        command: "metro.sh health ios ios"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 60
      success_threshold: 1

  # Phase 6: Build and deploy app
  deploy-ios:
    command: |
      set -e

      BUILD_CONFIG="${IOS_BUILD_CONFIG:-Release}"
      echo "📲 Building React Native app (${BUILD_CONFIG})"

      # Source Metro environment so React Native uses correct port
      . ${REACT_NATIVE_VIRTENV}/metro/env-ios.sh
      echo "Metro port: $METRO_PORT"

      # Get simulator UDID (retry for up to 30 seconds)
      max_attempts=15
      attempt=0
      DEVICE_UDID=""

      while [ $attempt -lt $max_attempts ] && [ -z "$DEVICE_UDID" ]; do
        if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
          DEVICE_UDID=$(xcrun simctl list devices | grep "Test" | grep "Booted" | grep -oE '[0-9A-F-]{36}' | head -1 || echo "")
        else
          DEVICE_UDID=$(xcrun simctl list devices | grep "Booted" | grep -oE '[0-9A-F-]{36}' | head -1 || echo "")
        fi

        if [ -z "$DEVICE_UDID" ]; then
          attempt=$((attempt + 1))
          echo "Waiting for simulator to boot... (attempt $attempt/$max_attempts)"
          sleep 2
        fi
      done

      if [ -z "$DEVICE_UDID" ]; then
        echo "ERROR: No booted simulator found after $max_attempts attempts" >&2
        xcrun simctl list devices >&2
        exit 1
      fi

      echo "Building for simulator: $DEVICE_UDID"

      # Build with ios.sh build
      NODE_BINARY="$NODE_BINARY" RCT_METRO_PORT="$METRO_PORT" \
        ios.sh build --config "$BUILD_CONFIG" --quiet

      # Install the built app
      echo "Installing app to simulator..."
      APP_PATH="${IOS_DERIVED_DATA_PATH:-${DEVBOX_PROJECT_ROOT}/.devbox/virtenv/ios/DerivedData}/Build/Products/${BUILD_CONFIG}-iphonesimulator/ReactNativeExample.app"

      if [ ! -d "$APP_PATH" ]; then
        echo "ERROR: App bundle not found at $APP_PATH" >&2
        ls -la "${IOS_DERIVED_DATA_PATH:-${DEVBOX_PROJECT_ROOT}/.devbox/virtenv/ios/DerivedData}/Build/Products/" >&2 || true
        exit 1
      fi

      xcrun simctl install "$DEVICE_UDID" "$APP_PATH"

      # Launch app with Metro port
      echo "Launching app with Metro on port $METRO_PORT..."
      xcrun simctl launch "$DEVICE_UDID" "${IOS_APP_BUNDLE_ID}" \
        RCT_METRO_PORT="$METRO_PORT"

      echo "✓ App deployed and launched successfully"
    depends_on:
      install-pods:
        condition: process_completed_successfully
      ios-simulator:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Phase 7: Verify app is running
  verify-app-running:
    command: |
      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        DEVICE_UDID=$(xcrun simctl list devices | grep "Test" | grep "Booted" | grep -oE '[0-9A-F-]{36}' | head -1)
      else
        DEVICE_UDID=$(xcrun simctl list devices | grep "Booted" | grep -oE '[0-9A-F-]{36}' | head -1)
      fi

      echo "Waiting for app to start..."
      max_attempts=10
      attempt=0
      while [ $attempt -lt $max_attempts ]; do
        if xcrun simctl spawn "$DEVICE_UDID" launchctl list | grep -q "${IOS_APP_BUNDLE_ID}"; then
          echo "✓ App is running: ${IOS_APP_BUNDLE_ID}"
          mkdir -p reports
          touch reports/.e2e-passed
          exit 0
        fi
        attempt=$((attempt + 1))
        echo "  Attempt $attempt/$max_attempts..."
        sleep 2
      done

      echo "ERROR: App did not start within timeout" >&2
      exit 1
    depends_on:
      deploy-ios:
        condition: process_completed_successfully
    availability:
      restart: "no"

  # Cleanup - runs after verify completes
  cleanup:
    command: |
      # Stop Metro bundler explicitly
      echo "Stopping Metro bundler..."
      metro.sh stop ios || true

      if [ "${DEVBOX_PURE_SHELL:-}" = "1" ]; then
        echo "🧹 Cleaning up (pure mode)..."

        test_sim_udid=$(cat .devbox/virtenv/ios/runtime/simulator-udid.txt 2>/dev/null || echo "")

        if [ -z "$test_sim_udid" ]; then
          test_sim_udid=$(xcrun simctl list devices | grep "Test" | grep -oE '[0-9A-F-]{36}' | head -1 || echo "")
        fi

        if [ -n "$test_sim_udid" ]; then
          xcrun simctl terminate "$test_sim_udid" "${IOS_APP_BUNDLE_ID}" 2>/dev/null || true
          xcrun simctl shutdown "$test_sim_udid" 2>/dev/null || true
          xcrun simctl delete "$test_sim_udid" 2>/dev/null || true
          rm -f .devbox/virtenv/ios/runtime/simulator-udid.txt 2>/dev/null || true
          echo "✓ App stopped, test simulator deleted"
        else
          echo "✓ No test simulator to clean up"
        fi
      else
        echo "✓ Test complete - app and simulator still running"
      fi
    depends_on:
      verify-app-running:
        condition: process_completed
    availability:
      restart: "no"

  # Summary - always runs, checks marker file for pass/fail
  summary:
    command: "bash tests/test-summary.sh 'React Native iOS E2E Test Suite' 'reports/react-native-ios-e2e-logs' 'reports/.e2e-passed'"
    depends_on:
      cleanup:
        condition: process_completed
    availability:
      restart: "no"
      exit_on_end: true
    shutdown:
      signal: 15
      timeout_seconds: 1
