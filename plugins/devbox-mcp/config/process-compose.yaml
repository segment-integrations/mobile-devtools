version: "0.5"

processes:
  mcp-server:
    command: node src/index.js
    working_dir: "{{ .Virtenv }}/../../../plugins/devbox-mcp"
    readiness_probe:
      initial_delay_seconds: 2
      period_seconds: 5
      exec:
        command: "pgrep -f 'node src/index.js'"
    availability:
      restart: on_failure
      max_restarts: 3
